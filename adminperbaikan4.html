<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard Admin - Raport Digital</title>

    <!-- ========================================== -->
    <!-- SHARED CSS & LIBRARIES -->
    <!-- ========================================== -->
    <link rel="icon" type="image/png" href="https://upload.wikimedia.org/wikipedia/commons/a/a0/Logo_dppi_512.png">

        crossorigin></script>

    <script>
        // 1. Blokir Klik Kanan (Context Menu)
        document.addEventListener("contextmenu", e => e.preventDefault());

        // 2. Blokir Shortcut Keyboard (F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+Shift+C, Ctrl+U, Ctrl+S)
        document.onkeydown = function (e) {
            if (
                e.keyCode === 123 || // F12
                (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 67 || e.keyCode === 74)) || // Inspect Element
                (e.ctrlKey && (e.keyCode === 85 || e.keyCode === 83)) // View Source & Save
            ) {
                e.preventDefault();
                return false;
            }
        };

        // 3. Debugger Trap (Membuat DevTools freeze jika dipaksa buka dengan cara lain)
        setInterval(() => {
            try { (function () { return false; }['constructor']('debugger')()); } catch (e) { }
        }, 100);
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');

        :root {
            --gold-primary: #D4AF37;
            --gold-light: #FFD700;
            --gold-glow: rgba(255, 215, 0, 0.4);
            --blue-royal: #1e3a8a;
            --blue-neon: #3b82f6;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #050505;
            color: #f8fafc;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .ambient-light {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -2;
            opacity: 0.5;
            animation: pulse-light 8s infinite alternate ease-in-out;
        }

        .light-gold {
            top: -10%;
            left: -10%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, var(--gold-primary), transparent 70%);
        }

        .light-blue {
            bottom: -10%;
            right: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, var(--blue-royal), transparent 70%);
            animation-delay: -4s;
        }

        @keyframes pulse-light {
            0% {
                transform: scale(1);
                opacity: 0.4;
            }

            100% {
                transform: scale(1.1);
                opacity: 0.6;
            }
        }

        .os-window {
            background: rgba(20, 25, 40, 0.6);
            backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            border-left: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(255, 255, 255, 0.05);
            transform-style: preserve-3d;
            transform: translateZ(0);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .os-input,
        .os-select {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: 0.3s;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.5);
        }

        .os-input:focus,
        .os-select:focus {
            border-color: var(--gold-light);
            box-shadow: 0 0 15px var(--gold-glow), inset 0 2px 5px rgba(0, 0, 0, 0.5);
            outline: none;
            background: rgba(0, 0, 0, 0.7);
        }

        .os-input:disabled,
        .os-select:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: rgba(0, 0, 0, 0.6);
        }

        .btn-gold {
            background: linear-gradient(135deg, #b45309 0%, #D4AF37 50%, #FFD700 100%);
            color: #000;
            font-weight: 800;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.4);
            transition: transform 0.1s ease, box-shadow 0.2s ease;
        }

        .btn-gold:active {
            transform: scale(0.98);
        }

        .btn-gold:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            filter: grayscale(0.5);
        }

        .btn-green {
            background: linear-gradient(135deg, #059669 0%, #10b981 100%);
            color: #fff;
            font-weight: 800;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3);
            transition: transform 0.1s ease;
        }

        .btn-green:active {
            transform: scale(0.98);
        }

        .btn-green:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            filter: grayscale(0.5);
        }

        .btn-red {
            background: linear-gradient(135deg, #991b1b 0%, #ef4444 100%);
            color: #fff;
            font-weight: 800;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 5px 15px rgba(239, 68, 68, 0.3);
            transition: transform 0.1s ease;
        }

        .btn-red:active {
            transform: scale(0.98);
        }

        .btn-red:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            filter: grayscale(0.5);
        }

        .text-gold-gradient {
            background: linear-gradient(to right, #F3E5AB, #FFD700, #D4AF37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.5));
        }

        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #FFD700;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .animate-in {
            animation: fadeIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
        }

        .custom-scrollbar:hover::-webkit-scrollbar-thumb {
            background: var(--gold-primary);
        }

        .lightbox-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s;
            flex-direction: column;
            backdrop-filter: blur(10px);
        }

        .lightbox-content {
            position: relative;
            max-width: 90%;
            max-height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .lightbox-img {
            max-width: 100%;
            max-height: 80vh;
            border: 2px solid var(--gold-primary);
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.5);
            border-radius: 10px;
        }

        .lightbox-badge {
            position: absolute;
            bottom: -15px;
            right: -10px;
            padding: 5px 15px;
            border-radius: 999px;
            font-size: 14px;
            z-index: 10001;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            background: #D4AF37;
            color: black;
            font-weight: bold;
            border: 1px solid white;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            z-index: 10002;
            background: rgba(255, 255, 255, 0.1);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .badge-base {
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .badge-kota {
            background: linear-gradient(135deg, #00C851, #007E33);
            color: white;
        }

        .badge-provinsi {
            background: linear-gradient(135deg, #33b5e5, #0099CC);
            color: white;
        }

        .badge-nasional {
            background: linear-gradient(135deg, #ff4444, #CC0000);
            color: white;
        }

        .badge-gold {
            background: linear-gradient(135deg, #FFD700, #B8860B);
            color: black;
            border-color: #FFFACD;
        }

        .btn-admin-logout {
            background: linear-gradient(180deg, #1a1a1a 0%, #000000 100%);
            border: 1px solid #7f1d1d;
            color: #ef4444;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .btn-admin-logout:hover {
            background: linear-gradient(180deg, #7f1d1d 0%, #450a0a 100%);
            color: white;
            border-color: #ef4444;
            box-shadow: 0 0 20px rgba(220, 38, 38, 0.4);
        }

        /* CSS KHUSUS UNTUK PRINT KERTAS F4 */
        @media print {
            @page {
                size: 215mm 330mm;
                /* Ukuran F4/Folio */
                margin: 15mm;
            }

            body * {
                visibility: hidden;
            }

            .print-area,
            .print-area * {
                visibility: visible;
            }

            .print-area {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                background: white;
                color: black;
                padding: 0;
                margin: 0;
            }

            .no-print {
                display: none !important;
            }

            table {
                width: 100%;
                border-collapse: collapse;
                font-size: 11px;
                font-family: 'Arial', sans-serif;
            }

            th,
            td {
                border: 1px solid black;
                padding: 4px;
                text-align: left;
                vertical-align: top;
            }

            th {
                background-color: #f0f0f0 !important;
                -webkit-print-color-adjust: exact;
                font-weight: bold;
            }

            .student-report-block {
                page-break-inside: avoid;
                margin-bottom: 20px;
                padding-bottom: 10px;
                border-bottom: 2px dashed #ccc;
            }

            .student-report-block:last-child {
                border-bottom: none;
            }

            /* EFEK CLIK & LOADING TOMBOL USER MANAGEMENT */
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }

            .fas.fa-spinner {
                animation: spin 1s linear infinite;
            }

            button:disabled {
                opacity: 0.7;
                cursor: not-allowed;
                transform: none !important;
            }

            .btn-action-user {
                transition: all 0.2s ease;
                position: relative;
            }

            .btn-action-user:active {
                transform: scale(0.95);
            }
