        function EditProfile({ user, role, onBack, onSuccess }) {
            const [form, setForm] = useState({
                newId: role === 'paskibraka' ? user.nik : user.username,
                nama: user.nama,
                lapangan: user.lapangan,
                jenisKelamin: user.jenisKelamin || '',
                telegramId: user.telegramId || '',
                password: ''
            });

            // State untuk Cropper Gambar
            const [imageSrc, setImageSrc] = useState(null);
            const [cropModalOpen, setCropModalOpen] = useState(false);
            const [croppedData, setCroppedData] = useState(null); // Menyimpan base64 hasil crop
            const cropperRef = React.useRef(null);
            const imageRef = React.useRef(null);

            const [loading, setLoading] = useState(false);

            // Saat file dipilih, baca sebagai URL dan buka modal crop
            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = () => {
                        setImageSrc(reader.result);
                        setCropModalOpen(true);
                    };
                    reader.readAsDataURL(file);
                }
            };

            // Inisialisasi Cropper.js saat gambar di modal dimuat
            const onImageLoad = () => {
                if (cropperRef.current) cropperRef.current.destroy(); // Hapus instance lama
                cropperRef.current = new window.Cropper(imageRef.current, {
                    aspectRatio: 1, // Memaksa rasio kotak/lingkaran (1:1) seperti WA
                    viewMode: 1,
                    autoCropArea: 1,
                    background: false,
                });
            };

            // Saat tombol "Terapkan Foto" di klik
            const handleCropSave = () => {
                if (cropperRef.current) {
                    const canvas = cropperRef.current.getCroppedCanvas({
                        width: 400,
                        height: 400,
                        imageSmoothingQuality: 'high',
                    });
                    // Ambil base64 tanpa prefix data:image/jpeg;base64,
                    const base64Image = canvas.toDataURL('image/jpeg').split(',')[1];
                    setCroppedData({ base64: base64Image, mime: 'image/jpeg', preview: canvas.toDataURL('image/jpeg') });
                    setCropModalOpen(false);
                }
            };

            const handleSave = () => {
                // TAMBAHAN: Deteksi perubahan form.jenisKelamin melawan data asli user.jenisKelamin (atau kosong jika belum ada)
                const hasChanges =
                    form.newId !== (role === 'paskibraka' ? user.nik : user.username) ||
                    form.nama !== user.nama ||
                    form.lapangan !== user.lapangan ||
                    (role === 'paskibraka' && form.jenisKelamin !== (user.jenisKelamin || '')) ||
                    form.telegramId !== (user.telegramId || '') ||
                    form.password !== '' ||
                    croppedData !== null;

                if (!hasChanges) return alert("Tidak ada perubahan data.");

                setLoading(true);

                let payload = {
                    newId: form.newId,
                    nama: form.nama,
                    lapangan: form.lapangan,
                    telegramId: form.telegramId
                };
                if (role === 'paskibraka') payload.jenisKelamin = form.jenisKelamin;

                if (form.password) payload.password = form.password;
                if (croppedData) {
                    payload.fotoData = croppedData.base64;
                    payload.fotoMime = croppedData.mime;
                }

                const id = role === 'paskibraka' ? user.nik : user.username;

                api.run('updateProfile', role, id, payload).then(res => {
                    setLoading(false);
                    alert(res.message);
                    if (res.status === 'success') {
                        currentUserData.data.telegramId = form.telegramId; // <--- AGAR STATE UPDATE
                        // Perbarui LocalStorage agar sesi tidak putus karena ID berubah
                        const currentUserData = JSON.parse(localStorage.getItem('currentUser'));
                        currentUserData.data.nama = form.nama;
                        currentUserData.data.lapangan = form.lapangan;
                        if (role === 'paskibraka') {
                            currentUserData.data.nik = form.newId;
                            currentUserData.data.jenisKelamin = form.jenisKelamin; // <--- TAMBAHAN INI
                        }

                        else currentUserData.data.username = form.newId;
                        if (form.password) currentUserData.data.password = form.password;
                        if (croppedData) currentUserData.data.foto = croppedData.preview;

                        localStorage.setItem('currentUser', JSON.stringify(currentUserData));

                        onSuccess(form.password);
                    }
                }).catch(err => {
                    setLoading(false);
                    alert("Error: " + err);
                });
            };

            return (
                <div className="os-window p-0 rounded-[2rem] h-[85vh] flex flex-col overflow-hidden animate-in">

                    {/* MODAL CROP GAMBAR */}
                    {cropModalOpen && (
                        <div className="fixed inset-0 z-[9999] bg-black flex flex-col">
                            <div className="p-4 flex justify-between items-center bg-black/80 text-white z-10 border-b border-white/10">
                                <button onClick={() => setCropModalOpen(false)} className="text-slate-400 hover:text-white"><i className="fas fa-times text-xl"></i></button>
                                <h3 className="font-bold text-sm">Sesuaikan Foto</h3>
                                <button onClick={handleCropSave} className="text-[#FFD700] font-bold text-sm">SELESAI</button>
                            </div>
                            <div className="flex-1 bg-black relative flex items-center justify-center overflow-hidden">
                                {/* Cropper membungkus gambar ini */}
                                <div style={{ width: '100%', height: '100%', maxHeight: '60vh' }}>
                                    <img ref={imageRef} src={imageSrc} onLoad={onImageLoad} style={{ maxWidth: '100%', display: 'block' }} />
                                </div>
                            </div>
                            <div className="p-6 text-center bg-black/80 text-[10px] text-slate-400 pb-10">
                                Geser dan cubit layar untuk menyesuaikan foto profil Anda agar pas berada di tengah.
                            </div>
                        </div>
                    )}

                    <div className="p-6 pb-4 border-b border-white/10 bg-[#050505]/80 backdrop-blur-xl z-10 flex-none text-center">
                        <h3 className="font-black text-white uppercase tracking-tight">EDIT PROFIL & DATA DIRI</h3>
                    </div>

                    <div className="flex-1 overflow-y-auto p-6 space-y-4 custom-scrollbar">
                        {/* PREVIEW FOTO PROFIL */}
                        <div className="flex flex-col items-center mb-6">
                            <div className="relative group w-24 h-24 rounded-full border-2 border-[#FFD700] overflow-hidden mb-2">
                                <img src={croppedData ? croppedData.preview : user.foto} className="w-full h-full object-cover" />
                                <div className="absolute inset-0 bg-black/50 flex items-center justify-center opacity-0 group-hover:opacity-100 transition pointer-events-none">
                                    <i className="fas fa-camera text-white text-xl"></i>
                                </div>
                                {/* Input file ditumpuk tak terlihat di atas foto */}
                                <input disabled={loading} type="file" accept="image/*" className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onChange={handleFileChange} />
                            </div>
                            <span className="text-[10px] text-slate-400 font-bold">Ketuk foto untuk ganti</span>
                        </div>

                        <div>
                            <label className="text-[10px] text-slate-400 mb-1 block font-bold">{role === 'paskibraka' ? 'NIK' : 'Username'} (ID Login)</label>
                            <input disabled={loading} value={form.newId} className="w-full p-3 os-input rounded-xl text-sm font-medium" onChange={e => setForm({ ...form, newId: e.target.value })} />
                        </div>
                        <div>
                            <label className="text-[10px] text-slate-400 mb-1 block font-bold">Nama Lengkap</label>
                            <input disabled={loading} value={form.nama} className="w-full p-3 os-input rounded-xl text-sm font-medium" onChange={e => setForm({ ...form, nama: e.target.value })} />
                        </div>
                        <div>
                            <label className="text-[10px] text-slate-400 mb-1 block font-bold">Nama Lapangan</label>
                            <input disabled={loading} value={form.lapangan} className="w-full p-3 os-input rounded-xl text-sm font-medium" onChange={e => setForm({ ...form, lapangan: e.target.value })} />
                        </div>

                        {role === 'paskibraka' && (
                            <div>
                                <label className="text-[10px] text-slate-400 mb-1 block font-bold">Jenis Kelamin</label>
                                <select disabled={loading} value={form.jenisKelamin} className="w-full p-3 os-select rounded-xl text-sm font-medium" onChange={e => setForm({ ...form, jenisKelamin: e.target.value })}>
                                    <option value="" disabled>Pilih Jenis Kelamin</option>
                                    <option value="Putra" className="text-black">Putra</option>
                                    <option value="Putri" className="text-black">Putri</option>
                                </select>
                            </div>
                        )}
                        {/* FITUR PENGHUBUNG TELEGRAM (SEMPURNA) */}
                        <div className="bg-blue-900/20 border border-blue-500/30 p-4 rounded-xl shadow-inner mb-4">
                            <label className="text-[10px] text-blue-400 mb-2 block font-black uppercase tracking-widest flex items-center gap-2">
                                <i className="fab fa-telegram-plane text-base"></i> Hubungkan Notifikasi Telegram
                            </label>
                            <div className="flex gap-2">
                                <input
                                    disabled={loading}
                                    value={form.telegramId}
                                    placeholder="Contoh: 123456789"
                                    className="flex-1 p-3 bg-black/40 border border-blue-500/20 rounded-xl text-sm font-medium text-white focus:border-blue-500"
                                    onChange={e => setForm({ ...form, telegramId: e.target.value })}
                                />
                                <a
                                    href="https://t.me/userinfobot"
                                    target="_blank"
                                    className="bg-blue-600 hover:bg-blue-500 text-white px-4 py-3 rounded-xl flex flex-col items-center justify-center transition shadow-lg w-20 flex-shrink-0"
                                    title="Cari ID Anda"
                                >
                                    <i className="fas fa-search text-xs mb-1"></i>
                                    <span className="text-[8px] font-black uppercase">Cari ID</span>
                                </a>
                            </div>
                            <p className="text-[9px] text-slate-400 mt-2 leading-relaxed">
                                Agar HP Anda berbunyi saat ada tugas/evaluasi, klik tombol <b>CARI ID</b>, buka bot Telegram, klik <b>Start</b>, lalu salin angka ID Anda ke kotak ini.
                            </p>
                        </div>
                        <div>
                            <label className="text-[10px] text-slate-400 mb-1 block font-bold">Ubah Password (Kosongkan jika tetap)</label>
                            <input disabled={loading} placeholder="Ketik sandi baru..." type="password" value={form.password} className="w-full p-3 os-input rounded-xl text-sm font-medium border border-red-500/30 focus:border-red-500" onChange={e => setForm({ ...form, password: e.target.value })} />
                        </div>
                    </div>

                    <div className="p-4 border-t border-white/10 bg-[#050505]/80 z-10 flex-none flex gap-3">
                        <button disabled={loading} onClick={onBack} className="flex-1 py-3 text-xs font-bold text-slate-400 hover:text-white">BATAL</button>
                        <button onClick={handleSave} disabled={loading} className="flex-1 btn-gold py-3 rounded-xl text-xs font-bold flex justify-center items-center gap-2">
                            {loading ? <i className="fas fa-spinner fa-spin"></i> : "SIMPAN PERUBAHAN"}
                        </button>
                    </div>
                </div>
            );
        }

        // --- KOMPONEN PENUGASAN KHUSUS PASKIBRAKA ---
        function TugasPaskibrakaView({ user, onBack }) {
            const [tugas, setTugas] = React.useState([]);
            const [view, setView] = React.useState('bulan');
            const [editingKolomId, setEditingKolomId] = React.useState(null);
            const [selectedBulan, setSelectedBulan] = React.useState('');
            const [selectedTugas, setSelectedTugas] = React.useState(null);
            const [pengumpulan, setPengumpulan] = React.useState([]);
            const [files, setFiles] = React.useState({});
            const [komentar, setKomentar] = React.useState('');
            const [activeKomentarId, setActiveKomentarId] = React.useState(null);
            const [loading, setLoading] = React.useState(false);

            // State Progress Bar
            const [uploadProgress, setUploadProgress] = React.useState(0);
            const [isUploading, setIsUploading] = React.useState(false);
            const [uploadingKolomId, setUploadingKolomId] = React.useState(null);

            // Pencarian
            const [searchQuery, setSearchQuery] = React.useState('');
            const [previewTugasLampiran, setPreviewTugasLampiran] = React.useState(null);

            const loadTugas = () => {
                setLoading(true);
                api.run('getTugas', user.nik)
                    .then(res => { setTugas(res || []); setLoading(false); })
                    .catch(err => { alert("Error: " + err); setLoading(false); });
            };
            React.useEffect(() => { loadTugas(); }, []);
            React.useEffect(() => { setSearchQuery(''); }, [view]);

            const getBulanStr = (dateStr) => {
                if (!dateStr) return 'TIDAK TERJADWAL';
                return new Date(dateStr).toLocaleString('id-ID', { month: 'long', year: 'numeric' }).toUpperCase();
            };
            const bulans = [...new Set(tugas.map(t => getBulanStr(t.waktu_mulai)))];

            const bukaTugas = (t) => {
                setSelectedTugas(t); setView('detail'); setLoading(true); setFiles({});
                api.run('getPengumpulan', t.id)
                    .then(res => {
                        const riwayatSaya = (res || []).filter(p => String(p.nik) === String(user.nik));
                        setPengumpulan(riwayatSaya); setLoading(false);
                    })
                    .catch(err => { alert("Error: " + err); setLoading(false); });
            };

            const submitTugasMedia = (id_kolom) => {
                const fileToUpload = files[id_kolom];
                if (!fileToUpload) return alert("Pilih file untuk kolom ini terlebih dahulu!");

                setIsUploading(true);
                setUploadingKolomId(id_kolom);
                setUploadProgress(0);

                // 1. Minta URL Upload Resumable langsung ke Server Google Drive
                api.run('getUploadUrl', {
                    filename: "KMPL_" + user.nik + "_" + fileToUpload.name,
                    mimeType: fileToUpload.type,
                    origin: window.location.origin // <--- PERBAIKAN: Tambahkan baris ini
                })
                    .then(res => {
                        // PERBAIKAN: Ekstrak URL secara aman meskipun Server mengembalikan Object atau String
                        const uploadUrl = typeof res === 'object' ? (res.uploadUrl || res.data) : res;

                        if (!uploadUrl || typeof uploadUrl !== 'string') {
                            setIsUploading(false);
                            setUploadingKolomId(null);
                            return alert("Gagal mendapatkan link upload yang valid dari server.");
                        }

                        // 2. Upload file murni secara langsung ke Drive (Bypass Apps Script limit)
                        const xhr = new XMLHttpRequest();
                        xhr.open('PUT', uploadUrl, true);

                        // PROGRESS BAR NYATA BERDASARKAN BYTES DIKIRIM
                        xhr.upload.onprogress = (e) => {
                            if (e.lengthComputable) {
                                const percentComplete = Math.round((e.loaded / e.total) * 100);
                                setUploadProgress(percentComplete);
                            }
                        };

                        xhr.onload = () => {
                            if (xhr.status === 200 || xhr.status === 201) {
                                let fileId = "";
                                try {
                                    const response = JSON.parse(xhr.responseText);
                                    fileId = response.id; // Mendapatkan ID File asli dari Google Drive
                                } catch (e) {
                                    fileId = "Sukses_Upload"; // Fallback aman jika Google tidak balas JSON
                                }

                                // 3. Simpan HANYA ID ke Spreadsheet (Sangat Ringan, Cepat, dan Aman)
                                api.run('submitTugas', {
                                    id_tugas: selectedTugas.id,
                                    id_kolom: id_kolom,
                                    nik: user.nik,
                                    nama: user.nama,
                                    mediaData: fileId, // Hanya mengirim ID, BUKAN Base64 Text yang berat
                                    mediaMime: 'drive_link' // Menandai bahwa ini file di Drive
                                }).then(submitRes => {
                                    setIsUploading(false);
                                    setUploadingKolomId(null);
                                    setEditingKolomId(null);
                                    alert(submitRes.message || "Tugas berhasil dikumpulkan!");
                                    bukaTugas(selectedTugas); // Refresh data
                                }).catch(err => {
                                    setIsUploading(false);
                                    setUploadingKolomId(null);
                                    alert("Gagal menyimpan data ke database: " + err);
                                });
                            } else {
                                setIsUploading(false);
                                alert("Gagal upload ke Google Drive. Mungkin jaringan terputus.");
                            }
                        };

                        xhr.onerror = () => {
                            setIsUploading(false);
                            alert("Terjadi kesalahan jaringan saat proses pengunggahan ke server Google.");
                        };

                        xhr.send(fileToUpload); // Kirim raw file murni, bukan teks base64
                    })
                    .catch(err => {
                        setIsUploading(false);
                        setUploadingKolomId(null);
                        alert("Gagal membuat sesi upload: " + err);
                    });
            };

            const handleHapusJawaban = (id_pengumpulan) => {
                if (confirm("Yakin ingin menghapus file jawaban ini? Anda harus mengumpulkannya kembali.")) {
                    setLoading(true);
                    api.run('deletePengumpulan', id_pengumpulan).then(res => {
                        alert(res.message);
                        bukaTugas(selectedTugas);
                    }).catch(err => {
                        alert("Error: " + err);
                        setLoading(false);
                    });
                }
            };

            const kirimKomentar = (id_pengumpulan) => {
                if (!komentar) return; setLoading(true);
                api.run('addKomentarTugas', { id_pengumpulan: id_pengumpulan, username: user.nama, role: 'Paskibraka', teks: komentar }).then(res => {
                    setKomentar(''); setActiveKomentarId(null); bukaTugas(selectedTugas);
                });
            };
            const handleDownload = (lampiran) => {
                if (lampiran.fileBase64) {
                    const link = document.createElement('a');
                    link.href = `data:${lampiran.fileMime};base64,${lampiran.fileBase64}`;
                    link.download = lampiran.nama || 'Lampiran';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                } else if (lampiran.url) {
                    const fileIdMatch = String(lampiran.url).match(/[-\w]{25,}/);
                    const fileId = fileIdMatch ? fileIdMatch[0] : lampiran.url;
                    window.open(`https://drive.google.com/uc?export=download&id=${fileId}`, '_blank');
                }
            };
            if (previewTugasLampiran) {
                return (
                    <div className="os-window p-6 rounded-[2rem] h-[85vh] animate-in flex flex-col overflow-hidden">
                        <div className="flex justify-between items-center mb-4 flex-none">
                            <button onClick={() => setPreviewTugasLampiran(null)} className="w-8 h-8 rounded-full bg-white/5 hover:bg-white/20 transition"><i className="fas fa-arrow-left"></i></button>
                            <h3 className="font-black text-sm text-purple-400 tracking-widest truncate ml-3 uppercase">{previewTugasLampiran.nama}</h3>
                        </div>
                        <div className="flex-1 w-full bg-black/40 rounded-xl overflow-hidden relative border border-white/10 mb-4 flex items-center justify-center">
                            {previewTugasLampiran.url ? (
                                <>
                                    <iframe src={`https://drive.google.com/file/d/${previewTugasLampiran.url.match(/[-\w]{25,}/) ? previewTugasLampiran.url.match(/[-\w]{25,}/)[0] : previewTugasLampiran.url}/preview?rm=minimal`} className="w-full h-full border-0 bg-white" allow="autoplay" title="Dokumen Lampiran Tugas"></iframe>
                                    {/* INVISIBLE SHIELD SUPER */}
                                    <div
                                        className="absolute top-0 left-0 w-full h-[70px] bg-transparent z-50 cursor-not-allowed"
                                        title="Akses Lanjutan Dikunci"
                                        onContextMenu={(e) => e.preventDefault()}>
                                    </div>
                                </>
                            ) : previewTugasLampiran.fileBase64 ? (
                                previewTugasLampiran.fileMime.includes('video') ? (
                                    <video controls src={`data:${previewTugasLampiran.fileMime};base64,${previewTugasLampiran.fileBase64}`} className="w-full rounded-lg max-h-full bg-black"></video>
                                ) : previewTugasLampiran.fileMime.includes('image') ? (
                                    <img src={`data:${previewTugasLampiran.fileMime};base64,${previewTugasLampiran.fileBase64}`} className="w-full rounded-lg max-h-full object-contain" />
                                ) : (
                                    <iframe src={`data:${previewTugasLampiran.fileMime};base64,${previewTugasLampiran.fileBase64}`} className="w-full h-full border-0 bg-white" title="Dokumen Lokal"></iframe>
                                )
                            ) : (
                                <div className="text-center p-6"><span className="text-white text-sm font-bold">Media Tidak Valid</span></div>
                            )}
                        </div>
                        <button onClick={() => handleDownload(previewTugasLampiran)} className="w-full bg-gradient-to-r from-purple-600 to-indigo-600 py-4 rounded-xl font-black text-white text-sm tracking-widest shadow-lg text-center flex items-center justify-center gap-2 transition hover:scale-[1.02] flex-none">
                            <i className="fas fa-cloud-download-alt"></i> UNDUH LAMPIRAN INI
                        </button>
                    </div>
                );
            }
            if (view === 'detail') return (
                <div className="os-window p-6 rounded-[2rem] h-[85vh] animate-in flex flex-col space-y-4 overflow-y-auto custom-scrollbar">
                    <div className="flex justify-between items-center border-b border-white/10 pb-2"><button onClick={() => setView('list')} className="w-8 h-8 rounded-full bg-white/5 disabled:opacity-50" disabled={isUploading}><i className="fas fa-arrow-left"></i></button><h3 className="font-bold text-[#FFD700] uppercase text-sm">PENGERJAAN TUGAS</h3></div>

                    <div className="bg-blue-900/20 p-4 rounded-xl border border-blue-500/30 shadow-inner">
                        <div className="flex justify-between items-start gap-2">
                            <h4 className="font-black text-white text-sm">{selectedTugas.judul}</h4>
                            <span className={`text-[9px] font-black px-2 py-0.5 rounded whitespace-nowrap ${selectedTugas.status_paskib === 'Belum Mengerjakan' ? 'bg-red-500/20 text-red-400' :
                                selectedTugas.status_paskib === 'Sudah Mengerjakan Tepat Waktu' ? 'bg-green-500/20 text-green-400' : 'bg-yellow-500/20 text-yellow-400'
                                }`}>{selectedTugas.status_paskib}</span>
                        </div>

                        {/* PERBAIKAN DESKRIPSI (SCROLL & WHITESPACE) */}
                        <div className="text-[11px] text-slate-300 mt-2 mb-2 p-3 bg-black/40 rounded-lg border border-white/5 max-h-48 overflow-y-auto custom-scrollbar whitespace-pre-wrap">
                            {selectedTugas.deskripsi}
                        </div>

                        <div className="flex flex-col gap-1 mt-3 pt-3 border-t border-blue-500/20 text-[9px] font-bold text-slate-400">
                            <div><i className="far fa-calendar-check mr-1 text-green-400"></i>MULAI: {new Date(selectedTugas.waktu_mulai).toLocaleString('id-ID')}</div>
                            <div><i className="far fa-calendar-times mr-1 text-red-400"></i>BATAS: {new Date(selectedTugas.waktu_selesai).toLocaleString('id-ID')}</div>
                        </div>

                        {/* LAMPIRAN TUGAS DARI PELATIH/ADMIN */}
                        {selectedTugas.lampiran && selectedTugas.lampiran.length > 0 && (
                            <div className="mt-4 pt-4 border-t border-white/10">
                                <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2"><i className="fas fa-paperclip mr-1"></i> Lampiran Dari Pelatih/Admin:</div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
                                    {selectedTugas.lampiran.map((lam, idx) => (
                                        <div key={idx} className="flex items-center justify-between p-2.5 bg-black/40 rounded-lg border border-white/5 transition text-left">
                                            <div className="flex items-center gap-2 overflow-hidden">
                                                <i className={`fas ${lam.tipe === 'File' ? 'fa-file-alt text-orange-400' : 'fa-link text-blue-400'} text-xs flex-shrink-0`}></i>
                                                <span className="text-xs text-white truncate font-medium">{lam.nama}</span>
                                            </div>
                                            <div className="flex gap-1.5 flex-shrink-0">
                                                <button onClick={() => { if (lam.tipe === 'File') setPreviewTugasLampiran(lam); else window.open(lam.url.startsWith('http') ? lam.url : 'https://' + lam.url, '_blank'); }} className="px-3 py-1 bg-blue-500/20 text-blue-400 rounded text-[9px] font-bold hover:bg-blue-500/40 transition">PREVIEW</button>
                                                {lam.tipe === 'File' && <button onClick={() => handleDownload(lam)} className="px-3 py-1 bg-emerald-500/20 text-emerald-400 rounded text-[9px] font-bold hover:bg-emerald-500/40 transition">UNDUH</button>}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>

                    {loading && !isUploading ? <div className="loader mx-auto mt-4"></div> : selectedTugas.kolom.map((k, idx) => {
                        const answer = pengumpulan.find(p => cleanStr(p.id_kolom) === cleanStr(k.id));
                        const isThisUploading = isUploading && uploadingKolomId === k.id;
                        const isEditingThisKolom = editingKolomId === k.id; // Deklarasikan status edit

                        return (
                            <div key={k.id} className="bg-black/40 p-4 rounded-xl border border-white/10">
                                <div className="flex items-center gap-2 mb-2">
                                    <div className="w-5 h-5 rounded bg-[#FFD700] text-black font-black flex items-center justify-center text-[10px]">{idx + 1}</div>
                                    <h4 className="font-bold text-white text-xs uppercase">{k.judul}</h4>
                                </div>

                                <div className="text-[10px] text-slate-300 mb-4 ml-7 max-h-32 overflow-y-auto custom-scrollbar whitespace-pre-wrap bg-black/20 p-2.5 rounded-lg border-l-2 border-[#FFD700]/50">
                                    {k.deskripsi || 'Tidak ada instruksi kolom.'}
                                </div>

                                {/* JIKA BELUM MENGUMPULKAN ATAU SEDANG MENEKAN TOMBOL EDIT JAWABAN */}
                                {(!answer || isEditingThisKolom) ? (
                                    <div className="ml-7 bg-red-900/10 p-3 rounded-xl border border-red-500/20 text-center">
                                        <p className="text-[10px] text-red-400 mb-2 font-bold tracking-widest uppercase">
                                            {isEditingThisKolom ? 'EDIT JAWABAN' : 'BELUM MENGUMPULKAN'}
                                        </p>
                                        <input
                                            disabled={isUploading}
                                            type="file"
                                            className="w-full text-[10px] mb-2 os-input p-2 rounded-lg"
                                            onChange={e => setFiles({ ...files, [k.id]: e.target.files[0] })}
                                        />

                                        {isThisUploading && (
                                            <div className="mb-3 p-3 bg-black/50 rounded-xl border border-white/10 text-left">
                                                <div className="flex justify-between text-[10px] font-bold text-[#FFD700] mb-2 uppercase tracking-wide">
                                                    <span className="flex items-center gap-2"><i className="fas fa-cloud-upload-alt animate-bounce"></i> Mengunggah File...</span>
                                                    <span>{uploadProgress}%</span>
                                                </div>
                                                <div className="w-full bg-white/10 rounded-full h-2 overflow-hidden shadow-inner">
                                                    <div className="bg-gradient-to-r from-[#B8860B] to-[#FFD700] h-2 rounded-full transition-all duration-300 ease-out" style={{ width: `${uploadProgress}%` }}></div>
                                                </div>
                                            </div>
                                        )}

                                        <button disabled={isUploading} onClick={() => submitTugasMedia(k.id)} className="btn-gold w-full p-2 px-4 rounded-lg text-[10px] font-bold shadow-lg flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                                            {isThisUploading ? <><i className="fas fa-spinner fa-spin"></i> MEMPROSES...</> : <><i className="fas fa-upload"></i> UPLOAD MEDIA</>}
                                        </button>

                                        {/* TOMBOL BATAL JIKA DALAM MODE EDIT */}
                                        {isEditingThisKolom && (
                                            <button disabled={isUploading} onClick={() => setEditingKolomId(null)} className="w-full mt-2 py-2 bg-red-500/20 text-red-400 rounded-lg text-[10px] font-bold border border-red-500/30 hover:bg-red-500/40 transition">
                                                <i className="fas fa-times mr-1"></i> BATAL EDIT
                                            </button>
                                        )}
                                    </div>
                                ) : (
                                    <div className="ml-7 bg-white/5 p-3 rounded-xl border border-white/10">
                                        {(() => {
                                            const lateStatus = getLateStatus(answer.waktu, selectedTugas.waktu_selesai);
                                            return (
                                                <div className={`font-bold text-[10px] mb-3 uppercase tracking-widest flex flex-col md:flex-row md:items-center justify-between gap-2 p-2 rounded-lg border ${lateStatus.bg}`}>
                                                    <div className="flex items-center gap-2">
                                                        <i className={`fas ${lateStatus.isLate ? 'fa-exclamation-circle' : 'fa-check-circle'} ${lateStatus.color}`}></i>
                                                        <span className={lateStatus.color}>DIKUMPULKAN: {new Date(answer.waktu).toLocaleString('id-ID')}</span>
                                                    </div>
                                                    <span className={`px-2 py-0.5 rounded bg-black/40 shadow-inner ${lateStatus.color}`}>{lateStatus.text}</span>
                                                </div>
                                            );
                                        })()}

                                        {answer.status_koreksi === "Sudah Dikoreksi" && (
                                            <div className="text-[9px] font-black bg-emerald-500/20 text-emerald-400 px-2 py-1 rounded border border-emerald-500/30 mb-2 inline-flex items-center gap-1">
                                                <i className="fas fa-clipboard-check text-xs"></i> TUGAS INI SUDAH DIKOREKSI & DIREVIEW
                                            </div>
                                        )}

                                        {/* KETERANGAN WAKTU EDIT */}
                                        {answer.waktu_edit && (
                                            <div className="text-[9px] text-yellow-400 font-bold italic mb-2">
                                                * Telah di edit pada {new Date(answer.waktu_edit).toLocaleString('id-ID', { day: '2-digit', month: 'long', year: 'numeric' })}
                                            </div>
                                        )}

                                        {answer.mediaData ? (
                                            <div id={`media-container-${k.id}`} className="w-full h-80 md:h-[400px] rounded-lg overflow-hidden border border-white/10 mb-2 relative bg-black/50 flex items-center justify-center group">
                                                {/* Tombol Play & Full Screen Dipertahankan */}
                                                <div className="absolute top-3 right-3 flex gap-2 z-[70] opacity-90 hover:opacity-100 transition-opacity">
                                                    {answer.mediaMime && answer.mediaMime.includes('video') && (
                                                        <button onClick={() => {
                                                            const media = document.getElementById(`media-${k.id}`);
                                                            if (media) { media.paused ? media.play() : media.pause(); }
                                                        }} className="px-3 py-1.5 bg-green-600/90 text-white rounded shadow-lg text-[10px] font-bold hover:bg-green-600 backdrop-blur-sm transition flex items-center">
                                                            <i className="fas fa-play mr-1"></i> PLAY / PAUSE
                                                        </button>
                                                    )}
                                                    <button onClick={(e) => {
                                                        const container = document.getElementById(`media-container-${k.id}`);
                                                        const videoElem = document.getElementById(`media-${k.id}`);
                                                        const btn = e.currentTarget;
                                                        const isNativeFullscreen = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement;

                                                        if (container) {
                                                            const isFauxFullscreen = container.classList.contains('ios-fullscreen');

                                                            if (!isNativeFullscreen && !isFauxFullscreen) {
                                                                // MASUK FULLSCREEN
                                                                if (container.requestFullscreen) {
                                                                    container.requestFullscreen().catch(() => container.classList.add('ios-fullscreen'));
                                                                } else if (container.webkitRequestFullscreen) {
                                                                    container.webkitRequestFullscreen();
                                                                } else if (videoElem && videoElem.webkitEnterFullscreen) {
                                                                    videoElem.webkitEnterFullscreen();
                                                                } else {
                                                                    container.classList.add('ios-fullscreen'); // Bypass iOS / Safari
                                                                }
                                                                btn.innerHTML = '<i class="fas fa-compress mr-1"></i> KELUAR FULL SCREEN';
                                                            } else {
                                                                // KELUAR FULLSCREEN
                                                                if (isNativeFullscreen) {
                                                                    if (document.exitFullscreen) document.exitFullscreen();
                                                                    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                                                                }
                                                                if (isFauxFullscreen) {
                                                                    container.classList.remove('ios-fullscreen');
                                                                }
                                                                btn.innerHTML = '<i class="fas fa-expand mr-1"></i> FULL SCREEN';
                                                            }
                                                        }
                                                    }} className="px-3 py-1.5 bg-purple-600/90 text-white rounded shadow-lg text-[10px] font-bold hover:bg-purple-600 backdrop-blur-sm transition flex items-center">
                                                        <i className="fas fa-expand mr-1"></i> FULL SCREEN
                                                    </button>
                                                </div>

                                                {/* Render Iframe/Video/Gambar */}
                                                {(!answer.mediaMime || (!answer.mediaMime.includes('image') && !answer.mediaMime.includes('video'))) ? (
                                                    <>
                                                        <iframe src={`https://drive.google.com/file/d/${String(answer.mediaData).match(/[-\w]{25,}/) ? String(answer.mediaData).match(/[-\w]{25,}/)[0] : answer.mediaData}/preview?rm=minimal`} className="w-full h-full border-0 bg-white" allow="autoplay" title="Dokumen Pratinjau"></iframe>
                                                        <div className="absolute top-0 left-0 w-full h-[70px] bg-transparent z-50 cursor-not-allowed" onContextMenu={(e) => e.preventDefault()}></div>
                                                        <a href={`https://drive.google.com/uc?export=download&id=${answer.mediaData}`} target="_blank" rel="noreferrer" className="absolute bottom-3 right-3 px-3 py-1.5 bg-blue-600/90 text-white rounded shadow-lg text-[10px] font-bold hover:bg-blue-600 transition z-[60]"><i className="fas fa-download mr-1"></i> UNDUH ASLI</a>
                                                    </>
                                                ) : answer.mediaMime.includes('video') ? (
                                                    <video id={`media-${k.id}`} controls controlsList="nodownload" src={`data:${answer.mediaMime};base64,${answer.mediaData}`} className="w-full rounded-lg max-h-full bg-black outline-none"></video>
                                                ) : answer.mediaMime.includes('image') ? (
                                                    <img id={`media-${k.id}`} src={`data:${answer.mediaMime};base64,${answer.mediaData}`} className="w-full rounded-lg max-h-full object-contain" alt="Bukti Penugasan" />
                                                ) : (
                                                    <div className="text-center p-6"><span className="text-white text-sm font-bold">Media Tidak Valid</span></div>
                                                )}
                                            </div>
                                        ) : (
                                            <div className="p-4 bg-red-900/10 rounded-xl border border-red-500/20 text-center mb-2">
                                                <i className="fas fa-exclamation-triangle text-xl text-red-400 mb-2"></i>
                                                <span className="text-white text-xs font-bold block">Media Tidak Ditemukan</span>
                                            </div>
                                        )}

                                        {/* MENU TINDAKAN: EDIT DAN HAPUS MUNCUL JIKA BELUM DIKOREKSI */}
                                        {answer.status_koreksi !== "Sudah Dikoreksi" && (
                                            <div className="flex gap-2 mt-3 mb-3 border-b border-white/5 pb-3">
                                                <button onClick={() => setEditingKolomId(k.id)} className="flex-1 py-2 bg-blue-500/20 text-blue-400 rounded-lg text-[10px] font-bold border border-blue-500/30 hover:bg-blue-500/40 transition">
                                                    <i className="fas fa-edit mr-1"></i> EDIT JAWABAN
                                                </button>
                                                <button onClick={() => handleHapusJawaban(answer.id_pengumpulan)} className="flex-1 py-2 bg-red-500/20 text-red-400 rounded-lg text-[10px] font-bold border border-red-500/30 hover:bg-red-500/40 transition">
                                                    <i className="fas fa-trash mr-1"></i> HAPUS JAWABAN
                                                </button>
                                            </div>
                                        )}

                                        <div className="bg-black/60 p-2 rounded-lg border border-white/5 mt-2">
                                            <div className="text-[9px] text-slate-400 mb-1 font-bold">KOLOM KOMENTAR</div>
                                            <div className="space-y-1 mb-2 max-h-24 overflow-y-auto custom-scrollbar">
                                                {answer.komentar?.map((kom, i) => (<div key={i} className="text-[10px]"><span className={`font-bold ${kom.role === 'Paskibraka' ? 'text-blue-400' : 'text-[#FFD700]'}`}>{kom.username}:</span> <span className="text-slate-300">{kom.teks}</span></div>))}
                                            </div>
                                            <div className="flex gap-2">
                                                <input value={activeKomentarId === answer.id_pengumpulan ? komentar : ''} placeholder="Balas komentar pelatih..." className="flex-1 p-1.5 os-input rounded text-[10px]" onChange={e => { setActiveKomentarId(answer.id_pengumpulan); setKomentar(e.target.value); }} />
                                                <button onClick={() => kirimKomentar(answer.id_pengumpulan)} className="px-2 bg-blue-600 text-white rounded text-[10px] hover:bg-blue-500"><i className="fas fa-paper-plane"></i></button>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        );
                    })}
                </div>
            );

            if (view === 'list') {
                const filteredTugas = tugas.filter(t =>
                    t.judul.toLowerCase().includes(searchQuery.toLowerCase())
                );

                return (
                    <div className="os-window p-6 rounded-[2rem] h-[85vh] animate-in flex flex-col overflow-y-auto custom-scrollbar">
                        <div className="flex justify-between items-center mb-4"><button onClick={() => setView('bulan')} className="w-8 h-8 rounded-full bg-white/5"><i className="fas fa-arrow-left"></i></button><h3 className="font-black text-sm">TUGAS {selectedBulan}</h3></div>

                        <div className="relative mb-3">
                            <i className="fas fa-search absolute top-3.5 left-3.5 text-slate-400 text-xs"></i>
                            <input
                                type="text"
                                placeholder="Cari nama/judul tugas disini..."
                                className="w-full p-2.5 pl-9 os-input rounded-xl text-xs"
                                value={searchQuery}
                                onChange={e => setSearchQuery(e.target.value)}
                            />
                        </div>

                        {filteredTugas.filter(t => getBulanStr(t.waktu_mulai) === selectedBulan).length === 0 ? (
                            <p className="text-center text-slate-400 text-xs mt-4">Tugas tidak ditemukan.</p>
                        ) : (
                            filteredTugas.filter(t => getBulanStr(t.waktu_mulai) === selectedBulan).map(t => (
                                <div key={t.id} onClick={() => bukaTugas(t)} className="bg-white/5 border border-white/10 p-4 rounded-xl mb-3 cursor-pointer hover:bg-blue-500/20 hover:border-blue-500/50 transition">
                                    <div className="font-bold text-white text-sm">{t.judul}</div>

                                    {/* PERBAIKAN DESKRIPSI (WHITESPACE) */}
                                    <div className="text-[10px] text-slate-400 mt-1 line-clamp-3 whitespace-pre-wrap">{t.deskripsi}</div>

                                    <div className="flex justify-between items-center mt-3 pt-2 border-t border-white/5 gap-2">
                                        <div className="text-[9px] text-red-400 font-bold whitespace-nowrap"><i className="far fa-clock mr-1"></i> DEADLINE: {new Date(t.waktu_selesai).toLocaleString('id-ID', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' })}</div>
                                        <span className={`text-[9px] font-black px-2 py-0.5 rounded whitespace-nowrap ${t.status_paskib === 'Belum Mengerjakan' ? 'bg-red-500/20 text-red-400' :
                                            t.status_paskib === 'Sudah Mengerjakan Tepat Waktu' ? 'bg-green-500/20 text-green-400' : 'bg-yellow-500/20 text-yellow-400'
                                            }`}>{t.status_paskib}</span>
                                    </div>
                                </div>
                            ))
                        )}
                    </div>
                );
            }

            return (
                <div className="os-window p-6 rounded-[2rem] h-[85vh] animate-in flex flex-col overflow-y-auto custom-scrollbar">
                    <div className="flex justify-between items-center mb-4"><button onClick={onBack} className="w-8 h-8 rounded-full bg-white/5"><i className="fas fa-arrow-left"></i></button><h3 className="font-black text-sm">PILIH BULAN PENUGASAN</h3></div>
                    {loading ? <div className="loader mx-auto"></div> : bulans.length === 0 ? <p className="text-center text-slate-400 text-xs py-10">Belum ada tugas yang diberikan ke kamu.</p> : bulans.map(b => (
                        <button key={b} onClick={() => { setSelectedBulan(b); setView('list'); }} className="w-full p-5 bg-gradient-to-r from-blue-900/40 to-indigo-900/40 border border-blue-500/30 rounded-xl mb-3 font-black text-blue-300 text-left hover:scale-[1.02] shadow-lg transition flex items-center justify-between">
                            <span><i className="far fa-calendar-alt mr-3 text-lg"></i> BULAN {b}</span>
                            <i className="fas fa-chevron-right opacity-50"></i>
                        </button>
                    ))}
                </div>
            );


        }

        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PaskibApp />);

    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(registration => {
                        console.log('Mesin PWA Aktif di area: ', registration.scope);
                    })
                    .catch(error => {
                        console.log('Mesin PWA Gagal Aktif: ', error);
                    });
            });
        }
    </script>
</body>

</html>
