        function DokumenPelatihView({ user, role, onBack, isAdmin }) {
            const BIDANG_LIST = ['TEKNIK', 'PEMBINAAN', 'PASUKAN 17', 'PASUKAN 8', 'NAMPAN', 'BENDERA', 'PDD', 'PELAKSANA DPPI'];
            const [activeBidang, setActiveBidang] = React.useState(BIDANG_LIST[0]);
            const [dokumen, setDokumen] = React.useState([]);
            const [loading, setLoading] = React.useState(false);
            const [showForm, setShowForm] = React.useState(false);

            const [form, setForm] = React.useState({ judul: '', visibilitas: 'Public' });
            const [file, setFile] = React.useState(null);
            const [uploadProgress, setUploadProgress] = React.useState(0); // State Progres Baru

            const loadData = () => {
                setLoading(true);
                api.run('getDokumenPelatih', user.username, role).then(res => {
                    setDokumen(res || []);
                    setLoading(false);
                }).catch(e => { console.error(e); setLoading(false); });
            };

            React.useEffect(() => { loadData(); }, []);

            const filteredDocs = dokumen.filter(d => d.bidang === activeBidang);

            // Ganti seluruh fungsi handleUpload di DokumenPelatihView dengan kode ini:
            const handleUpload = async () => {
                if (!form.judul || !file) return alert("Judul dan File wajib diisi!");
                setLoading(true);
                setUploadProgress(0); // Reset progress yang nyata

                try {
                    // 1. Minta URL Upload Resumable langsung ke Server Google Drive
                    const resUrl = await api.run('getUploadUrl', {
                        filename: "DOK_" + Date.now() + "_" + file.name,
                        mimeType: file.type,
                        origin: window.location.origin
                    });

                    // Ekstrak URL secara aman
                    const uploadUrl = typeof resUrl === 'object' ? (resUrl.uploadUrl || resUrl.data) : resUrl;

                    if (!uploadUrl || typeof uploadUrl !== 'string') {
                        setLoading(false);
                        return alert("Gagal mendapatkan link upload yang valid dari server.");
                    }

                    // 2. Upload file murni secara langsung ke Drive (Bypass Apps Script limit)
                    const xhr = new XMLHttpRequest();
                    xhr.open('PUT', uploadUrl, true);

                    // Progress bar nyata berdasarkan byte file
                    xhr.upload.onprogress = (e) => {
                        if (e.lengthComputable) {
                            const percentComplete = Math.round((e.loaded / e.total) * 100);
                            setUploadProgress(percentComplete);
                        }
                    };

                    xhr.onload = () => {
                        if (xhr.status === 200 || xhr.status === 201) {
                            const response = JSON.parse(xhr.responseText);
                            const fileId = response.id; // Mendapatkan ID File asli dari Google Drive

                            // 3. Simpan HANYA ID ke Spreadsheet
                            const payload = {

                                                    const container = document.getElementById(`doc-container-${d.id}`);
                                                    const videoElem = document.getElementById(`doc-media-${d.id}`);
                                                    const btn = e.currentTarget;
                                                    const isNativeFullscreen = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement;

                                                    if (container) {
                                                        const isFauxFullscreen = container.classList.contains('ios-fullscreen');

                                                        if (!isNativeFullscreen && !isFauxFullscreen) {
                                                            // MASUK FULLSCREEN
                                                            if (container.requestFullscreen) {
                                                                container.requestFullscreen().catch(() => container.classList.add('ios-fullscreen'));
                                                            } else if (container.webkitRequestFullscreen) {
                                                                container.webkitRequestFullscreen();
                                                            } else if (videoElem && videoElem.webkitEnterFullscreen) {
                                                                videoElem.webkitEnterFullscreen(); // Khusus Video Safari Lama
                                                            } else {
                                                                container.classList.add('ios-fullscreen'); // Bypass Khusus iPhone iOS
                                                            }
                                                            btn.innerHTML = '<i class="fas fa-compress mr-1"></i> KELUAR FULL SCREEN';
                                                        } else {
                                                            // KELUAR FULLSCREEN
                                                            if (isNativeFullscreen) {
                                                                if (document.exitFullscreen) document.exitFullscreen();
                                                                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                                                            }
                                                            if (isFauxFullscreen) {
                                                                container.classList.remove('ios-fullscreen');
                                                            }
                                                            btn.innerHTML = '<i class="fas fa-expand mr-1"></i> FULL SCREEN';
                                                        }
                                                    }
                                                }} className="px-3 py-1.5 bg-purple-600/90 text-white rounded shadow-lg text-[10px] font-bold hover:bg-purple-600 backdrop-blur-sm transition flex items-center">

                                                    <img id={`doc-media-${d.id}`} src={`data:${d.mediaMime};base64,${d.mediaData}`} className="w-full max-h-full object-contain" />
                                                ) : (
                                                    <span className="text-white text-xs font-bold">Media Tidak Valid</span>
                                                )

       function PemberianMateriPelatih({ user, onBack }) {

            const today = new Date(getWibDate);
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            const hh = String(today.getHours()).padStart(2, '0');
            const min = String(today.getMinutes()).padStart(2, '0');

            const [form, setForm] = React.useState({ 
                tanggal: `${yyyy}-${mm}-${dd}`, 
                waktu: `${hh}:${min}`, 
                materi: '', 
                keterangan: '' 
            });

            const loadData = () => {
                setLoading(true);
                api.run('getPemberianMateri').then(res => {
                    // Filter hanya milik pelatih yang sedang login
                    const myData = (res || []).filter(m => m.pengirim === user.lapangan);
                    setDataMateri(myData);
                    setLoading(false);
                }).catch(err => { console.error(err); setLoading(false); });

            React.useEffect(() => { loadData(); }, []);

                    tanggal: form.tanggal,

            // FUNGSI HANDLE DELETE TELAH DIHAPUS DARI SINI

            );

            // MODE INPUT FORM (TAMPILAN PERTAMA)
            // ===================================

            // ===================================

        function PelatihApp() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('home');
            const [loading, setLoading] = useState(false);
            const [lightboxData, setLightboxData] = useState(null);
            // Tambahkan state ini untuk fitur pratinjau
            const [previewFile, setPreviewFile] = React.useState(null);

            useEffect(() => {
                const stored = localStorage.getItem('currentUser');
                if (stored) {
                    const parsed = JSON.parse(stored);
                    if (parsed.role !== 'pelatih') { alert("Akses Ditolak"); window.location.href = "index.html"; }
                    else setUser(parsed.data);
                } else {
                    window.location.href = "index.html";
                }
            }, []);

            const handleLogout = () => {
                localStorage.removeItem('currentUser');
                window.location.href = "index.html";
            };

            const handleRefreshProfile = async () => {
                if (!user) return; setLoading(true);
                try {
                    const res = await api.run('loginUser', user.username, user.password, 'pelatih');
                    setUser(res);
                    localStorage.setItem('currentUser', JSON.stringify({ role: 'pelatih', data: res }));
                    alert("Data Profil Tersinkronisasi");
                } catch (e) { console.error(e); } setLoading(false);
            };

            const openPhoto = (src, badgeText, badgeClass) => { if (src) setLightboxData({ src, badgeText, badgeClass }); };

            const handleEditSuccess = (newPass) => {
                alert("Password berhasil diubah. Silakan Login Ulang.");
                handleLogout();
            };

            if (!user) return <div className="flex h-screen items-center justify-center"><div className="loader"></div></div>;

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-4">
                    <Background3D />
                    <div className="w-full max-w-lg relative z-0 mt-4 mb-4">
                        {view === 'materi' && <MateriView user={user} role="pelatih" onBack={() => setView('home')} />}
                        {view === 'home' && <PelatihDashboard
                            user={user} onLogout={handleLogout} onStartEval={() => setView('select-member')}
                            onHistory={() => setView('history')} onEditProfile={() => setView('edit-profile')}
                            onRefresh={handleRefreshProfile} loading={loading} onPhotoClick={openPhoto}
                            onTrainingFeedback={() => setView('training-feedback')}
                            onViewMateri={() => setView('materi')}
                            onViewPenugasan={() => setView('penugasan')}
                            onViewDokumenPelatih={() => setView('dokumen-pelatih')}
                            onViewPemberianMateri={() => setView('pemberian-materi')}
                        />}
                        {view === 'select-member' && <PelatihSelectMember onBack={() => setView('home')} onSelect={(member) => setView({ name: 'member-detail', member })} />}
                        {view === 'edit-profile' && <EditProfile user={user} role="pelatih" onBack={() => setView('home')} onSuccess={handleEditSuccess} />}
                        {view === 'history' && <PelatihHistory user={user} onBack={() => setView('home')} onSelectHistory={(item) => setView({ name: 'history-detail', item })} />}
                        {view === 'pemberian-materi' && <PemberianMateriPelatih user={user} onBack={() => setView('home')} />}

                        {view?.name === 'member-detail' && <PelatihMemberDetail member={view.member} user={user} onBack={() => setView('select-member')} onAddEval={() => setView({ name: 'input-eval', member: view.member })} onPhotoClick={openPhoto} />}
                        {view?.name === 'input-eval' && <PelatihEvalForm member={view.member} user={user} onBack={() => setView({ name: 'member-detail', member: view.member })} />}
                        {view?.name === 'history-detail' && <PelatihHistoryDetail item={view.item} onBack={() => setView('history')} onPhotoClick={openPhoto} />}
                        {view === 'training-feedback' && <TrainingFeedbackForm user={user} role="pelatih" onBack={() => setView('home')} />}
                        {view === 'penugasan' && <TugasManajemenView user={user} role={user.role || (view === 'pelatih' ? 'pelatih' : 'admin')} onBack={() => setView('home')} />}

        // --- DASHBOARD COMPONENTS ---
        function PelatihDashboard({ user, onLogout, onStartEval, onHistory, onEditProfile, onRefresh, loading, onPhotoClick, onTrainingFeedback, onViewPenugasan, onViewMateri, onViewDokumenPelatih, onViewPemberianMateri }) {
            const [bioEnabled, setBioEnabled] = useState(localStorage.getItem('paskib_bio_enabled') === 'true');

            const toggleBiometric = () => {
                const newState = !bioEnabled;
                setBioEnabled(newState);
                localStorage.setItem('paskib_bio_enabled', newState);

        function PelatihEvalForm({ member, user, onBack }) {
            const [form, setForm] = useState({ date: '', time: '', tehnik: '', sikap: '', teguran: '', prestasi: '', stars: 0 });
            const [file, setFile] = useState(null);
            const [loading, setLoading] = useState(false);

            useEffect(() => {
                const now = new Date();
                const year = now.getFullYear();
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const day = String(now.getDate()).padStart(2, '0');
                const hour = String(now.getHours()).padStart(2, '0');
                const minute = String(now.getMinutes()).padStart(2, '0');

                setForm(prev => ({ ...prev, date: `${year}-${month}-${day}`, time: `${hour}:${minute}` }));
            }, []);

            const handleSubmit = () => {
                setLoading(true);
                const payload = { ...form, paskibrakaNik: member.nik, coachUsername: user.username, coachName: user.nama, coachJob: user.jabatan };
                const send = (finalPayload) => {
                    api.run('addEvaluation', finalPayload).then(res => {
                        alert(res.message); setLoading(false); onBack();
                    });
                };
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        payload.mediaData = e.target.result.split(',')[1]; payload.mediaMime = file.type; send(payload);
                    };
                    reader.readAsDataURL(file);
                } else send(payload);
            };

            return (
                <div className="os-window p-0 rounded-[2rem] h-[85vh] flex flex-col overflow-hidden animate-in">
                    <div className="p-6 pb-4 border-b border-white/10 bg-[#050505]/80 backdrop-blur-xl z-10 flex-none text-center">

                            <div><label className="block text-slate-400 text-[10px] mb-1 font-bold">JAM (OTOMATIS)</label><input disabled type="time" className="w-full p-3 os-input rounded-xl text-sm opacity-70" value={form.time} /></div>
                        </div>
                        <textarea disabled={loading} placeholder="Koreksi Tehnik" rows="3" className="w-full p-3 os-input rounded-xl" onChange={e => setForm({ ...form, tehnik: e.target.value })}></textarea>
                        <textarea disabled={loading} placeholder="Koreksi Sikap" rows="3" className="w-full p-3 os-input rounded-xl" onChange={e => setForm({ ...form, sikap: e.target.value })}></textarea>
                        <textarea disabled={loading} placeholder="Teguran (Opsional)" rows="2" className="w-full p-3 os-input rounded-xl border-red-500/20 focus:border-red-500" onChange={e => setForm({ ...form, teguran: e.target.value })}></textarea>

                        <div className="bg-cyan-900/10 border border-cyan-500/20 p-3 rounded-xl">
                            <label className="block text-cyan-400 text-xs font-bold mb-2 uppercase tracking-wide">Prestasi & Bintang</label>
                            <div className="flex gap-2 mb-3 justify-center">
                                {[1, 2, 3, 4, 5].map((star) => (
                                    <button type="button" key={star} onClick={(e) => { e.preventDefault(); setForm(prev => ({ ...prev, stars: star })); }} className="text-2xl transition hover:scale-110 focus:outline-none p-1 transform active:scale-95">
                                        <i className={`${star <= form.stars ? 'fas text-[#FFD700] drop-shadow-[0_0_5px_rgba(255,215,0,0.8)]' : 'far text-slate-600'} fa-star`}></i>
                                    </button>
                                ))}
                            </div>
                            <textarea disabled={loading} placeholder="Keterangan Prestasi (Opsional)" rows="2" className="w-full p-3 os-input rounded-xl border-cyan-500/20 focus:border-cyan-500 text-sm" onChange={e => setForm({ ...form, prestasi: e.target.value })}></textarea>
                        </div>

                        <div>
                            <label className="block text-slate-400 text-xs mb-1 font-bold">Upload Media (Maks 40MB)</label>
                            <input disabled={loading} type="file" className="w-full p-2 os-input rounded-xl text-xs" onChange={e => setFile(e.target.files[0])} />
                        </div>
                    </div>
                    <div className="p-4 border-t border-white/10 bg-[#050505]/80 z-10 flex-none flex gap-3">
                        <button disabled={loading} onClick={onBack} className="flex-1 py-3 text-xs font-bold text-slate-400 hover:text-white">BATAL</button>

                    </div>
                </div>
            );

        function EditProfile({ user, role, onBack, onSuccess }) {
            const [form, setForm] = useState({
                newId: role === 'paskibraka' ? user.nik : user.username,
                nama: user.nama,
                lapangan: user.lapangan,
                telegramId: user.telegramId || '',
                password: ''
            });

            // State untuk Cropper Gambar
            const [imageSrc, setImageSrc] = useState(null);
            const [cropModalOpen, setCropModalOpen] = useState(false);
            const [croppedData, setCroppedData] = useState(null); // Menyimpan base64 hasil crop
            const cropperRef = React.useRef(null);
            const imageRef = React.useRef(null);

            const [loading, setLoading] = useState(false);

            // Saat file dipilih, baca sebagai URL dan buka modal crop
            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = () => {
                        setImageSrc(reader.result);
                        setCropModalOpen(true);
                    };
                    reader.readAsDataURL(file);
                }
            };

            // Inisialisasi Cropper.js saat gambar di modal dimuat
            const onImageLoad = () => {
                if (cropperRef.current) cropperRef.current.destroy(); // Hapus instance lama
                cropperRef.current = new window.Cropper(imageRef.current, {
                    aspectRatio: 1, // Memaksa rasio kotak/lingkaran (1:1) seperti WA
                    viewMode: 1,
                    autoCropArea: 1,
                    background: false,
                });
            };

            // Saat tombol "Terapkan Foto" di klik
            const handleCropSave = () => {
                if (cropperRef.current) {
                    const canvas = cropperRef.current.getCroppedCanvas({
                        width: 400,
                        height: 400,
                        imageSmoothingQuality: 'high',
                    });
                    // Ambil base64 tanpa prefix data:image/jpeg;base64,
                    const base64Image = canvas.toDataURL('image/jpeg').split(',')[1];
                    setCroppedData({ base64: base64Image, mime: 'image/jpeg', preview: canvas.toDataURL('image/jpeg') });
                    setCropModalOpen(false);
                }
            };

            const handleSave = () => {
                const hasChanges =
                    form.newId !== (role === 'paskibraka' ? user.nik : user.username) ||
                    form.nama !== user.nama ||
                    form.lapangan !== user.lapangan ||
                    form.telegramId !== (user.telegramId || '') ||
                    form.password !== '' ||
                    croppedData !== null;

                if (!hasChanges) return alert("Tidak ada perubahan data.");

                setLoading(true);

                let payload = {
                    newId: form.newId,
                    nama: form.nama,
                    lapangan: form.lapangan,
                    telegramId: form.telegramId
                };

                if (form.password) payload.password = form.password;
                if (croppedData) {
                    payload.fotoData = croppedData.base64;
                    payload.fotoMime = croppedData.mime;
                }

                const id = role === 'paskibraka' ? user.nik : user.username;

                api.run('updateProfile', role, id, payload).then(res => {
                    setLoading(false);
                    alert(res.message);
                    if (res.status === 'success') {
                        currentUserData.data.telegramId = form.telegramId; // <--- AGAR STATE UPDATE
                        // Perbarui LocalStorage agar sesi tidak putus karena ID berubah
                        const currentUserData = JSON.parse(localStorage.getItem('currentUser'));
                        currentUserData.data.nama = form.nama;
                        currentUserData.data.lapangan = form.lapangan;
                        if (role === 'paskibraka') currentUserData.data.nik = form.newId;
                        else currentUserData.data.username = form.newId;
                        if (form.password) currentUserData.data.password = form.password;
                        if (croppedData) currentUserData.data.foto = croppedData.preview;

                        localStorage.setItem('currentUser', JSON.stringify(currentUserData));

                        onSuccess(form.password);
                    }
                }).catch(err => {
                    setLoading(false);
                    alert("Error: " + err);
                });
            };

            return (
                <div className="os-window p-0 rounded-[2rem] h-[85vh] flex flex-col overflow-hidden animate-in">

                    {/* MODAL CROP GAMBAR */}
                    {cropModalOpen && (
                        <div className="fixed inset-0 z-[9999] bg-black flex flex-col">
                            <div className="p-4 flex justify-between items-center bg-black/80 text-white z-10 border-b border-white/10">
                                <button onClick={() => setCropModalOpen(false)} className="text-slate-400 hover:text-white"><i className="fas fa-times text-xl"></i></button>
                                <h3 className="font-bold text-sm">Sesuaikan Foto</h3>
                                <button onClick={handleCropSave} className="text-[#FFD700] font-bold text-sm">SELESAI</button>
                            </div>
                            <div className="flex-1 bg-black relative flex items-center justify-center overflow-hidden">
                                {/* Cropper membungkus gambar ini */}
                                <div style={{ width: '100%', height: '100%', maxHeight: '60vh' }}>
                                    <img ref={imageRef} src={imageSrc} onLoad={onImageLoad} style={{ maxWidth: '100%', display: 'block' }} />
                                </div>
                            </div>
                            <div className="p-6 text-center bg-black/80 text-[10px] text-slate-400 pb-10">
                                Geser dan cubit layar untuk menyesuaikan foto profil Anda agar pas berada di tengah.
                            </div>
                        </div>
                    )}

                    <div className="p-6 pb-4 border-b border-white/10 bg-[#050505]/80 backdrop-blur-xl z-10 flex-none text-center">
                        <h3 className="font-black text-white uppercase tracking-tight">EDIT PROFIL & DATA DIRI</h3>
                    </div>

                    <div className="flex-1 overflow-y-auto p-6 space-y-4 custom-scrollbar">
                        {/* PREVIEW FOTO PROFIL */}
                        <div className="flex flex-col items-center mb-6">
                            <div className="relative group w-24 h-24 rounded-full border-2 border-[#FFD700] overflow-hidden mb-2">
                                <img src={croppedData ? croppedData.preview : user.foto} className="w-full h-full object-cover" />
                                <div className="absolute inset-0 bg-black/50 flex items-center justify-center opacity-0 group-hover:opacity-100 transition pointer-events-none">
                                    <i className="fas fa-camera text-white text-xl"></i>
                                </div>
                                {/* Input file ditumpuk tak terlihat di atas foto */}
                                <input disabled={loading} type="file" accept="image/*" className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onChange={handleFileChange} />
                            </div>
                            <span className="text-[10px] text-slate-400 font-bold">Ketuk foto untuk ganti</span>
                        </div>

                        <div>
                            <label className="text-[10px] text-slate-400 mb-1 block font-bold">{role === 'paskibraka' ? 'NIK' : 'Username'} (ID Login)</label>
                            <input disabled={loading} value={form.newId} className="w-full p-3 os-input rounded-xl text-sm font-medium" onChange={e => setForm({ ...form, newId: e.target.value })} />
                        </div>
                        <div>
                            <label className="text-[10px] text-slate-400 mb-1 block font-bold">Nama Lengkap</label>
                            <input disabled={loading} value={form.nama} className="w-full p-3 os-input rounded-xl text-sm font-medium" onChange={e => setForm({ ...form, nama: e.target.value })} />
                        </div>
                        <div>
                            <label className="text-[10px] text-slate-400 mb-1 block font-bold">Nama Lapangan</label>
                            <input disabled={loading} value={form.lapangan} className="w-full p-3 os-input rounded-xl text-sm font-medium" onChange={e => setForm({ ...form, lapangan: e.target.value })} />
                        </div>
                        {/* FITUR PENGHUBUNG TELEGRAM (SEMPURNA) */}
<div className="bg-blue-900/20 border border-blue-500/30 p-4 rounded-xl shadow-inner mb-4">
    <label className="text-[10px] text-blue-400 mb-2 block font-black uppercase tracking-widest flex items-center gap-2">
        <i className="fab fa-telegram-plane text-base"></i> Hubungkan Notifikasi Telegram
    </label>
    <div className="flex gap-2">
        <input 
            disabled={loading} 
            value={form.telegramId} 
            placeholder="Contoh: 123456789" 
            className="flex-1 p-3 bg-black/40 border border-blue-500/20 rounded-xl text-sm font-medium text-white focus:border-blue-500" 
            onChange={e => setForm({ ...form, telegramId: e.target.value })} 
        />
        <a 
            href="https://t.me/userinfobot" 
            target="_blank" 
            className="bg-blue-600 hover:bg-blue-500 text-white px-4 py-3 rounded-xl flex flex-col items-center justify-center transition shadow-lg w-20 flex-shrink-0"
            title="Cari ID Anda"
        >
            <i className="fas fa-search text-xs mb-1"></i>
            <span className="text-[8px] font-black uppercase">Cari ID</span>
        </a>
    </div>
    <p className="text-[9px] text-slate-400 mt-2 leading-relaxed">
        Agar HP Anda berbunyi saat ada tugas/evaluasi, klik tombol <b>CARI ID</b>, buka bot Telegram, klik <b>Start</b>, lalu salin angka ID Anda ke kotak ini.
    </p>
</div>
                        <div>
                            <label className="text-[10px] text-slate-400 mb-1 block font-bold">Ubah Password (Kosongkan jika tetap)</label>
                            <input disabled={loading} placeholder="Ketik sandi baru..." type="password" value={form.password} className="w-full p-3 os-input rounded-xl text-sm font-medium border border-red-500/30 focus:border-red-500" onChange={e => setForm({ ...form, password: e.target.value })} />
                        </div>
                    </div>

                    <div className="p-4 border-t border-white/10 bg-[#050505]/80 z-10 flex-none flex gap-3">
                        <button disabled={loading} onClick={onBack} className="flex-1 py-3 text-xs font-bold text-slate-400 hover:text-white">BATAL</button>
                        <button onClick={handleSave} disabled={loading} className="flex-1 btn-gold py-3 rounded-xl text-xs font-bold flex justify-center items-center gap-2">
                            {loading ? <i className="fas fa-spinner fa-spin"></i> : "SIMPAN PERUBAHAN"}
                        </button>
                    </div>
                </div>
            );
        }

       



        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PelatihApp />);
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(registration => {
                        console.log('Mesin PWA Aktif di area: ', registration.scope);
                    })
                    .catch(error => {
                        console.log('Mesin PWA Gagal Aktif: ', error);
                    });
            });
        }
    </script>
</body>

</html>
