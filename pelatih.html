    <script>
        // 1. Blokir Klik Kanan (Context Menu)
        document.addEventListener("contextmenu", e => e.preventDefault());

        // 2. Blokir Shortcut Keyboard (F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+Shift+C, Ctrl+U, Ctrl+S)
        document.onkeydown = function (e) {
            if (
                e.keyCode === 123 || // F12
                (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 67 || e.keyCode === 74)) || // Inspect Element
                (e.ctrlKey && (e.keyCode === 85 || e.keyCode === 83)) // View Source & Save
            ) {
                e.preventDefault();
                return false;
            }
        };

        // 3. Debugger Trap (Membuat DevTools freeze jika dipaksa buka dengan cara lain)
        setInterval(() => {
            try { (function () { return false; }['constructor']('debugger')()); } catch (e) { }
        }, 100);
    </script>

<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="env,react">
        const { useState, useEffect } = React;
        // HELPER UTAMA: Mengabaikan Spasi di Awal/Akhir & Huruf Besar/Kecil
        const cleanStr = (val) => String(val || "").trim().toLowerCase();
        // HELPER: Menghitung keterlambatan pengumpulan tugas
        const getLateStatus = (submitTime, deadlineTime) => {
            if (!submitTime || !deadlineTime) return null;
            const submitDate = new Date(submitTime);
            const deadlineDate = new Date(deadlineTime);

            if (submitDate <= deadlineDate) {
                return { isLate: false, text: "TEPAT WAKTU", color: "text-green-400", bg: "bg-green-500/20 border-green-500/30" };
            }

            const diffMs = submitDate - deadlineDate;
            const diffMins = Math.floor(diffMs / 60000);
            const days = Math.floor(diffMins / 1440);
            const hours = Math.floor((diffMins % 1440) / 60);
            const mins = diffMins % 60;

            let lateText = "TERLAMBAT ";
            if (days > 0) lateText += `${days} HARI `;
            if (hours > 0) lateText += `${hours} JAM `;
            if (mins > 0 || (days === 0 && hours === 0)) lateText += `${mins} MENIT`;

            return { isLate: true, text: lateText.trim(), color: "text-red-400", bg: "bg-red-500/20 border-red-500/30" };
        };
        const LOGO_DPPI = "https://upload.wikimedia.org/wikipedia/commons/3/36/Logo_DPPI.png";
        const LOGO_YOGYA = "https://upload.wikimedia.org/wikipedia/commons/d/db/Logo_Pemkot_Yk.png";
        const LOGO_PASKIB = "https://upload.wikimedia.org/wikipedia/commons/d/dc/Logo_paskibraka.png";

        // --- KONFIGURASI API GITHUB PAGES ---
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyWShwCuygjDQ6BJeNgVCNDV0mrc9j3P9jVQSOl92iXu51GfND4y0pX4DU18eBy_IRX/exec";

        // --- API BRIDGE CERDAS (Auto GET/POST) ---
        const api = {
            run: async (funcName, ...args) => {
                return new Promise(async (resolve, reject) => {
                    try {
                        let payload = {};
                        let isGet = false;

                        // Pemetaan argument dari kode lama ke Payload API baru
                        if (funcName === 'loginUser' || funcName === 'login') {
                            funcName = 'login';
                            payload = { username: args[0], password: args[1], type: args[2] };
                        }
                        else if (funcName === 'updateProfile') payload = { role: args[0], id: args[1], newData: args[2] };
                        else if (funcName === 'submitReply') payload = { evalId: args[0], nik: args[1], text: args[2] };
                        else if (funcName === 'addEvaluation') payload = args[0];
                        else if (funcName === 'addTrainingFeedback') payload = args[0];
                        else if (funcName === 'addTugas') payload = args[0];
                        else if (funcName === 'addKomentarTugas') payload = args[0];
                        else if (funcName === 'editTugas') payload = args[0];
                        else if (funcName === 'deleteTugas') payload = args[0];
                        else if (funcName === 'toggleKoreksi') payload = args[0];
                        else if (funcName === 'downloadSecureFile') payload = { fileId: args[0] };
                        else if (funcName === 'getUploadUrl') payload = args[0];
                        else if (funcName === 'addDokumenPelatih') payload = args[0];
                        else if (funcName === 'deleteDokumenPelatih') payload = { id: args[0] };
                        else if (funcName === 'addPemberianMateri') payload = args[0];
                        else if (funcName === 'deletePemberianMateri') payload = { id: args[0] };


                        // FUNGSI YANG HARUS MENGGUNAKAN GET BERDASARKAN KODE.GS
                        else if (funcName === 'getEvaluasiByDate') { payload = { nik: args[0] }; isGet = true; }
                        else if (funcName === 'getStarHistory') { payload = { nik: args[0] }; isGet = true; }
                        else if (funcName === 'getReplies') { payload = { evalId: args[0] }; isGet = true; }
                        else if (funcName === 'getCoachHistory') { payload = { username: args[0] }; isGet = true; }
                        else if (funcName === 'getAdminDashboardData') { isGet = true; }
                        else if (funcName === 'getTugas') { payload = { target: args[0] }; isGet = true; }
                        else if (funcName === 'getPengumpulan') { payload = { id_tugas: args[0] }; isGet = true; }
                        else if (funcName === 'addMateri') payload = args[0];
                        else if (funcName === 'deleteMateri') payload = { id: args[0] };
                        else if (funcName === 'getMateri') { isGet = true; }
                        else if (funcName === 'getDokumenPelatih') { payload = { username: args[0], role: args[1] }; isGet = true; }
                        else if (funcName === 'getPemberianMateri') { isGet = true; }

                        let response;
                        if (isGet) {
                            const qs = new URLSearchParams({ action: funcName, ...payload }).toString();
                            response = await fetch(`${GAS_WEB_APP_URL}?${qs}`);
                        } else {
                            response = await fetch(GAS_WEB_APP_URL, {
                                method: "POST", redirect: "follow",
                                headers: { "Content-Type": "text/plain;charset=utf-8" },
                                body: JSON.stringify({ action: funcName, payload: payload })
                            });
                        }

                        const result = await response.json();

                        if (result.status === 'success' || result.status === 'error') {
                            if (result.status === 'error') reject(result.message);
                            else resolve(result.data !== undefined ? result.data : result);
                        } else resolve(result);

                    } catch (error) {
                        reject("Gagal terhubung ke server database.");
                    }
                });
            }
        };

        // --- SHARED COMPONENTS ---
        const getBadgeClass = (penugasan) => {
            if (!penugasan) return 'badge-kota';
            const p = penugasan.toLowerCase();
            if (p.includes('provinsi')) return 'badge-provinsi';
            if (p.includes('nasional')) return 'badge-nasional';
            return 'badge-kota';
        };

        function Background3D() {
            return (
                <>
                    <div className="ambient-light light-gold"></div>
                    <div className="ambient-light light-blue"></div>
                </>
            );
        }

        function StarRating({ count, size = "text-xs" }) {
            const numCount = parseInt(count) || 0;
            if (numCount < 0) return (<div className={`flex items-center gap-1 ${size} text-red-500 font-bold`}><i className="fas fa-minus-circle"></i><span>{Math.abs(numCount)} BINTANG</span></div>);
            const starCount = Math.max(0, Math.min(5, numCount));
            return (<div className={`flex gap-0.5 ${size} text-[#FFD700]`}>{[...Array(5)].map((_, i) => (<i key={i} className={`${i < starCount ? "fas" : "far"} fa-star drop-shadow-[0_0_2px_rgba(255,215,0,0.5)]`}></i>))}</div>);
        }

        function MediaModal({ src, badgeText, badgeClass, onClose }) {
            if (!src) return null;
            const isVideo = src.startsWith("data:video/") || src.toLowerCase().match(/\.(mp4|webm|ogg|mov)(\?|$)/i);
            return (
                <div className="lightbox-overlay" onClick={onClose}>
                    <div className="lightbox-close" onClick={onClose}><i className="fas fa-times"></i></div>
                    <div className="lightbox-content" onClick={(e) => e.stopPropagation()}>
                        {isVideo ? <video controls autoPlay playsInline className="lightbox-img bg-black" style={{ width: '100%', maxHeight: '80vh' }}><source src={src} />Browser Anda tidak mendukung tag video.</video> : <img src={src} className="lightbox-img" />}
                        {badgeText && <div className={`lightbox-badge badge-base ${badgeClass}`}>{badgeText}</div>}
                    </div>
                </div>
            );
        }

        function PasswordDisplay({ password }) {
            const [show, setShow] = useState(false);
            return (
                <div className="flex justify-between items-center w-full">
                    <span className={show ? "font-mono font-bold text-white drop-shadow-md" : "font-mono font-bold text-slate-500"}>{show ? password : "••••••••"}</span>
                    <button onClick={() => setShow(!show)} className="text-xs text-gold-primary hover:text-white transition drop-shadow-md"><i className={`fas ${show ? 'fa-eye-slash' : 'fa-eye'}`}></i></button>
                </div>
            );
        }

        function StatusBadge({ status }) {
            let colorClass = 'bg-gray-500/20 text-gray-400 border-gray-500/30';
            if (status === 'Active') colorClass = 'bg-green-500/20 text-green-400 border-green-500/30 shadow-[0_0_10px_rgba(74,222,128,0.2)]';
            else if (status === 'Pending') colorClass = 'bg-orange-500/20 text-orange-400 border-orange-500/30';
            else if (status === 'Blocked' || status === 'Non-Active') colorClass = 'bg-red-500/20 text-red-400 border-red-500/30';
            return <span className={`px-2 py-0.5 rounded text-[10px] font-bold uppercase border ${colorClass}`}>{status}</span>;
        }

        function FullProfileCard({ user, type }) {
            const isPaskib = type === 'paskibraka';
            const badgeClass = isPaskib ? getBadgeClass(user.penugasan) : 'badge-gold';
            return (
                <div className="space-y-3 text-sm animate-in">
                    <div className="bg-white/5 rounded-xl border border-white/10 overflow-hidden shadow-lg backdrop-blur-sm">
                        <div className="bg-white/5 p-2 px-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest border-b border-white/5">DATA UTAMA</div>
                        <div className="p-4 space-y-3">
                            <div className="flex justify-between border-b border-white/5 pb-2"><span className="text-slate-400">Peran</span><span className="font-bold text-gold-primary uppercase drop-shadow">{type}</span></div>
                            <div className="flex justify-between border-b border-white/5 pb-2"><span className="text-slate-400">{isPaskib ? 'NIK' : 'Username'}</span><span className="font-bold text-white drop-shadow">{isPaskib ? user.nik : user.username}</span></div>
                            <div className="flex justify-between border-b border-white/5 pb-2"><span className="text-slate-400">Nama Lengkap</span><span className="font-bold text-white text-right drop-shadow">{user.nama}</span></div>
                            <div className="flex justify-between border-b border-white/5 pb-2"><span className="text-slate-400">Nama Lapangan</span><span className="font-bold text-gold-gradient">{user.lapangan}</span></div>
                            <div className="flex justify-between items-center"><span className="text-slate-400">Status Akun</span><StatusBadge status={user.status} /></div>
                        </div>
                    </div>
                    <div className="bg-white/5 rounded-xl border border-white/10 overflow-hidden shadow-lg backdrop-blur-sm">
                        <div className="bg-white/5 p-2 px-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest border-b border-white/5">DETAIL & KEAMANAN</div>
                        <div className="p-4 space-y-3">
                            {isPaskib ? (
                                <><div className="flex justify-between border-b border-white/5 pb-2"><span className="text-slate-400">Asal Sekolah</span><span className="font-bold text-white text-right drop-shadow">{user.sekolah}</span></div><div className="flex justify-between items-center border-b border-white/5 pb-2"><span className="text-slate-400">Penugasan</span><span className={`px-2 py-0.5 rounded text-[10px] font-bold ${badgeClass} badge-base`}>{user.penugasan}</span></div></>
                            ) : (
                                <div className="flex justify-between items-center border-b border-white/5 pb-2"><span className="text-slate-400">Jabatan</span><span className={`px-2 py-0.5 rounded text-[10px] font-bold ${badgeClass} badge-base`}>{user.jabatan}</span></div>
                            )}
                            <div className="flex flex-col gap-1"><span className="text-slate-400 text-xs">Password</span><div className="bg-black/30 p-2 rounded border border-white/5 inner-shadow"><PasswordDisplay password={user.password} /></div></div>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================

        // --- KOMPONEN RUANG MATERI ---
        function MateriView({ user, role, onBack }) {
            const [materi, setMateri] = React.useState([]);
            const [view, setView] = React.useState('list');
            const [loading, setLoading] = React.useState(false);
            const [searchQuery, setSearchQuery] = React.useState('');

            const [form, setForm] = React.useState({ judul: '', deskripsi: '' });
            const [lampiranList, setLampiranList] = React.useState([]); // State Multi Lampiran
            const [uploadProgress, setUploadProgress] = React.useState(0);
            const [previewMateri, setPreviewMateri] = React.useState(null);

            const loadMateri = () => { setLoading(true); api.run('getMateri').then(res => { setMateri(res || []); setLoading(false); }).catch(err => { console.error(err); setLoading(false); }); };
            React.useEffect(() => { loadMateri(); }, []);

            const handleAddFile = (e) => {
                const file = e.target.files[0];
                if (file) {
                    if (file.size > 2000 * 1024 * 1024) return alert("Satu file maksimal 10MB!");
                    setLampiranList([...lampiranList, { id: Date.now(), tipe: 'File', file: file, nama: file.name }]);
                }
                e.target.value = null; // reset
            };

            const handleAddLink = () => {
                const url = prompt("Masukkan Tautan/Link (contoh: https://youtube.com/...)");
                if (url) {
                    const nama = prompt("Masukkan Judul untuk Tautan ini:", "Tautan Eksternal");
                    setLampiranList([...lampiranList, { id: Date.now(), tipe: 'Link', url: url, nama: nama || 'Tautan' }]);
                }
            };

            const handleRemoveLampiran = (id) => setLampiranList(lampiranList.filter(l => l.id !== id));

            const processLampiran = async () => {
                let processed = [];
                for (let item of lampiranList) {
                    if (item.tipe === 'File' && item.file) {
                        const base64 = await new Promise((resolve) => {
                            const reader = new FileReader();
                            reader.onload = (e) => resolve(e.target.result.split(',')[1]);
                            reader.readAsDataURL(item.file);
                        });
                        processed.push({ tipe: 'File', nama: item.nama, fileBase64: base64, fileMime: item.file.type });
                    } else {
                        processed.push({ tipe: 'Link', nama: item.nama, url: item.url });
                    }
                }
                return processed;
            };

            const handleUpload = async () => {
                if (!form.judul || !form.deskripsi) return alert("Judul dan Deskripsi wajib diisi!");
                if (lampiranList.length === 0) return alert("Masukkan minimal 1 File atau Tautan!");

                setLoading(true);
                setUploadProgress(5);
                try {
                    let processedLampiran = [];
                    const fileItems = lampiranList.filter(l => l.tipe === 'File');
                    const totalFiles = fileItems.length;
                    let currentFileIndex = 0;

                    for (let item of lampiranList) {
                        if (item.tipe === 'Link') {
                            processedLampiran.push({ tipe: 'Link', nama: item.nama, url: item.url });
                        } else if (item.tipe === 'File' && item.file) {
                            currentFileIndex++;

                            // Ambil URL Sesi Resumable langsung dari Server Google Drive
                            const resUrl = await api.run('getUploadUrl', {
                                filename: "FILE_" + Date.now() + "_" + item.nama,
                                mimeType: item.file.type,
                                origin: window.location.origin
                            });

                            // 1. Ambil URL Sesi Resumable langsung dari Server Google Drive
                            const uploadUrl = typeof resUrl === 'object' ? (resUrl.uploadUrl || resUrl.data) : resUrl;



                            const fileId = await new Promise((resolve, reject) => {
                                const xhr = new XMLHttpRequest();
                                xhr.open('PUT', uploadUrl, true);

                                // Progress bar akurat berdasarkan byte data yang terkirim
                                xhr.upload.onprogress = (e) => {
                                    if (e.lengthComputable) {
                                        const filePercent = Math.round((e.loaded / e.total) * 80);
                                        // Kalkulasi progress akumulatif jika ada lebih dari 1 file
                                        const basePercent = ((currentFileIndex - 1) / totalFiles) * 80;
                                        setUploadProgress(Math.round(basePercent + (filePercent / totalFiles)));
                                    }
                                };

                                xhr.onload = () => {
                                    if (xhr.status === 200 || xhr.status === 201) {
                                        resolve(JSON.parse(xhr.responseText).id);
                                    } else {
                                        reject("Gagal mengunggah file: " + item.nama);
                                    }
                                };
                                xhr.onerror = () => reject("Kesalahan jaringan pada file: " + item.nama);
                                xhr.send(item.file);
                            });

                            processedLampiran.push({
                                tipe: 'File',
                                nama: item.nama,
                                url: fileId, // Menyimpan ID File asli Drive
                                fileMime: item.file.type
                            });
                        }
                    }

                    // 3. Kirim paket data teks akhir ke database Spreadsheet
                    const payload = {
                        tanggal: new Date().toISOString().split('T')[0],
                        pengunggah: user.nama + ` (${role})`,
                        judul: form.judul,
                        deskripsi: form.deskripsi,
                        lampiran: processedLampiran
                    };

                    setUploadProgress(90);
                    const res = await api.run('addMateri', payload);
                    setUploadProgress(100);

                    setTimeout(() => {
                        alert(res.message);
                        loadMateri();
                        setView('list');
                        setUploadProgress(0);
                        setLampiranList([]);
                        setForm({ judul: '', deskripsi: '' });
                    }, 500);

                } catch (err) {
                    setLoading(false);
                    setUploadProgress(0);
                    alert("Terjadi kesalahan sistem: " + err);
                }
            };

            const handleDelete = (id) => { if (confirm("Yakin ingin menghapus materi ini?")) { setLoading(true); api.run('deleteMateri', id).then(res => { alert(res.message); loadMateri(); }); } };

            const handleDownload = async (lampiran) => {
                if (lampiran.fileBase64) {
                    const link = document.createElement('a');
                    link.href = `data:${lampiran.fileMime};base64,${lampiran.fileBase64}`;
                    link.download = lampiran.nama || 'Lampiran';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                } else if (lampiran.url) {
                    const fileIdMatch = lampiran.url.match(/[-\w]{25,}/);
                    const fileId = fileIdMatch ? fileIdMatch[0] : lampiran.url;
                    try {
                        document.body.style.cursor = 'wait';
                        const res = await api.run('downloadSecureFile', fileId);
                        const link = document.createElement('a');
                        link.href = `data:${res.mimeType};base64,${res.base64}`;
                        link.download = res.name || lampiran.nama || 'Dokumen_Unduhan';
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                    } catch (err) {
                        alert("Gagal memproses unduhan: " + err);
                    } finally {
                        document.body.style.cursor = 'default';
                    }
                }
            };
            // ==========================================
            // HTML: TIMPA BLOK KODE `if (previewMateri)`
            // ==========================================
            // ==========================================
            // HTML: TIMPA BLOK KODE `if (previewMateri)`
            // ==========================================
            if (previewMateri) {
                return (
                    <div className="os-window p-6 rounded-[2rem] h-[85vh] animate-in flex flex-col overflow-hidden">
                        <div className="flex justify-between items-center mb-4 flex-none">
                            <button onClick={() => setPreviewMateri(null)} className="w-8 h-8 rounded-full bg-white/5 hover:bg-white/20 transition"><i className="fas fa-arrow-left"></i></button>
                            <h3 className="font-black text-sm text-teal-400 tracking-widest truncate ml-3 uppercase">{previewMateri.nama}</h3>
                        </div>

                        <div id="materi-container" className="flex-1 w-full bg-black/40 rounded-xl overflow-hidden relative border border-white/10 mb-4 flex items-center justify-center group">

                            {/* TOMBOL FULL SCREEN */}
                            <div className="absolute top-3 right-3 flex gap-2 z-[70] opacity-90 hover:opacity-100 transition-opacity">
                                <button onClick={(e) => {
                                    const container = document.getElementById('materi-container');
                                    const videoElem = document.getElementById('materi-video');
                                    const btn = e.currentTarget;
                                    const isNativeFullscreen = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement;

                                    if (container) {
                                        const isFauxFullscreen = container.classList.contains('ios-fullscreen');

                                        if (!isNativeFullscreen && !isFauxFullscreen) {
                                            // MASUK FULLSCREEN
                                            if (container.requestFullscreen) {
                                                container.requestFullscreen().catch(() => container.classList.add('ios-fullscreen'));
                                            } else if (container.webkitRequestFullscreen) {
                                                container.webkitRequestFullscreen();
                                            } else if (videoElem && videoElem.webkitEnterFullscreen) {
                                                videoElem.webkitEnterFullscreen();
                                            } else {
                                                container.classList.add('ios-fullscreen'); // Bypass iOS
                                            }
                                            btn.innerHTML = '<i class="fas fa-compress mr-1"></i> KELUAR FULL SCREEN';
                                        } else {
                                            // KELUAR FULLSCREEN
                                            if (isNativeFullscreen) {
                                                if (document.exitFullscreen) document.exitFullscreen();
                                                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                                            }
                                            if (isFauxFullscreen) {
                                                container.classList.remove('ios-fullscreen');
                                            }
                                            btn.innerHTML = '<i class="fas fa-expand mr-1"></i> FULL SCREEN';
                                        }
                                    }
                                }} className="px-3 py-1.5 bg-purple-600/90 text-white rounded shadow-lg text-[10px] font-bold hover:bg-purple-600 backdrop-blur-sm transition flex items-center">
                                    <i className="fas fa-expand mr-1"></i> FULL SCREEN
                                </button>
                            </div>

                            {previewMateri.fileBase64 ? (
                                /* JIKA VIDEO / GAMBAR / PDF LOKAL MENGGUNAKAN DATA URI */
                                previewMateri.fileMime?.includes('video') ? (
                                    <video id="materi-video" controls controlsList="nodownload" src={`data:${previewMateri.fileMime};base64,${previewMateri.fileBase64}`} className="w-full rounded-lg max-h-full bg-black outline-none"></video>
                                ) : previewMateri.fileMime?.includes('image') ? (
                                    <img src={`data:${previewMateri.fileMime};base64,${previewMateri.fileBase64}`} className="w-full rounded-lg max-h-full object-contain" alt="Materi Gambar" />
                                ) : (
                                    /* PERUBAHAN: Render iframe data uri daripada pesan "Pratinjau Tidak Tersedia" */
                                    <iframe src={`data:${previewMateri.fileMime};base64,${previewMateri.fileBase64}`} className="w-full h-full border-0 bg-white" title="Dokumen Lokal"></iframe>
                                )
                            ) : previewMateri.url ? (
                                /* JIKA DOKUMEN VIA LINK GOOGLE DRIVE */
                                <>
                                    <iframe src={`https://drive.google.com/file/d/${String(previewMateri.url).match(/[-\w]{25,}/) ? String(previewMateri.url).match(/[-\w]{25,}/)[0] : previewMateri.url}/preview?rm=minimal`} className="w-full h-full border-0 bg-white" allow="autoplay" title="Dokumen Materi"></iframe>
                                    <div className="absolute top-0 left-0 w-full h-[70px] bg-transparent z-50 cursor-not-allowed" onContextMenu={(e) => e.preventDefault()} onClick={(e) => { e.preventDefault(); e.stopPropagation(); }}></div>
                                </>
                            ) : (
                                <div className="text-center p-6"><span className="text-white text-sm font-bold">Media Tidak Valid</span></div>
                            )}
                        </div>
                        <button onClick={() => handleDownload(previewMateri)} className="w-full bg-gradient-to-r from-teal-600 to-emerald-600 py-4 rounded-xl font-black text-white text-sm tracking-widest shadow-lg text-center flex items-center justify-center gap-2 transition hover:scale-[1.02] flex-none">
                            <i className="fas fa-cloud-download-alt"></i> UNDUH LAMPIRAN MATERI
                        </button>
                    </div>
                );
            }
            if (view === 'create') {
                return (
                    <div className="os-window p-6 rounded-[2rem] h-[85vh] animate-in flex flex-col space-y-4 overflow-y-auto custom-scrollbar">
                        <div className="flex justify-between items-center bg-black/50 p-4 -mx-6 -mt-6 rounded-t-[2rem] mb-2"><button onClick={() => setView('list')} className="w-8 h-8 rounded-full bg-white/5 hover:bg-white/20"><i className="fas fa-arrow-left"></i></button><h3 className="font-bold tracking-widest text-teal-400">UNGGAH MATERI BARU</h3></div>
                        <input disabled={loading} placeholder="Judul Materi" className="p-3 os-input rounded-xl font-bold" value={form.judul} onChange={e => setForm({ ...form, judul: e.target.value })} />
                        <textarea disabled={loading} placeholder="Deskripsi Singkat" rows="3" className="p-3 os-input rounded-xl text-sm" value={form.deskripsi} onChange={e => setForm({ ...form, deskripsi: e.target.value })}></textarea>

                        <div className="bg-black/30 p-4 rounded-xl border border-white/10">
                            <label className="text-xs font-bold text-teal-400 mb-3 block">LAMPIRAN (Bisa lebih dari satu)</label>

                            <div className="space-y-2 mb-4">
                                {lampiranList.map((l, i) => (
                                    <div key={l.id} className="flex justify-between items-center bg-white/5 p-2 rounded-lg border border-white/10">
                                        <div className="flex items-center gap-2 text-xs text-white truncate"><i className={`fas ${l.tipe === 'File' ? 'fa-file-alt text-orange-400' : 'fa-link text-blue-400'}`}></i> <span className="truncate max-w-[200px]">{l.nama}</span></div>
                                        <button onClick={() => handleRemoveLampiran(l.id)} className="text-red-400 hover:text-red-500 p-1"><i className="fas fa-times"></i></button>
                                    </div>
                                ))}
                                {lampiranList.length === 0 && <div className="text-[10px] text-slate-500 italic text-center py-2">Belum ada lampiran ditambahkan.</div>}
                            </div>

                            <div className="flex gap-2">
                                <label className="flex-1 bg-white/10 hover:bg-white/20 text-white text-xs font-bold py-2 rounded-lg text-center cursor-pointer transition border border-white/20">
                                    <i className="fas fa-upload mr-1"></i> TAMBAH FILE
                                    <input type="file" className="hidden" onChange={handleAddFile} disabled={loading} />
                                </label>
                                <button onClick={handleAddLink} disabled={loading} className="flex-1 bg-white/10 hover:bg-white/20 text-white text-xs font-bold py-2 rounded-lg text-center transition border border-white/20"><i className="fas fa-link mr-1"></i> TAMBAH TAUTAN</button>
                            </div>
                        </div>

                        {loading && (
                            <div className="w-full bg-black/50 rounded-full h-5 mt-2 overflow-hidden border border-white/20 relative shadow-inner">
                                <div className="bg-gradient-to-r from-teal-500 to-emerald-400 h-5 rounded-full transition-all duration-300 ease-out" style={{ width: `${uploadProgress}%` }}></div>
                                <div className="absolute inset-0 flex items-center justify-center text-[10px] font-black text-white tracking-widest">{uploadProgress}% MENGUNGGAH...</div>
                            </div>
                        )}
                        <button disabled={loading} onClick={handleUpload} className={`w-full ${loading ? 'bg-slate-700' : 'bg-gradient-to-r from-teal-600 to-emerald-600 hover:scale-[1.02]'} py-4 rounded-xl font-black text-white text-sm tracking-widest mt-2 shadow-lg transition-all`}>{loading ? "MEMPROSES..." : "PUBLIKASIKAN MATERI"}</button>
                    </div>
                );
            }

            const filteredMateri = materi.filter(m => m.judul.toLowerCase().includes(searchQuery.toLowerCase()));

            return (
                <div className="os-window p-6 rounded-[2rem] h-[85vh] animate-in flex flex-col overflow-y-auto custom-scrollbar">
                    <div className="flex justify-between items-center mb-4"><button onClick={onBack} className="w-8 h-8 rounded-full bg-white/5 hover:bg-white/20"><i className="fas fa-arrow-left"></i></button><h3 className="font-black text-sm text-teal-400 tracking-widest">RUANG MATERI</h3></div>
                    {(role === 'admin' || role === 'pelatih') && <button onClick={() => setView('create')} className="w-full bg-teal-600/20 text-teal-400 border border-teal-500/30 p-4 rounded-xl mb-4 text-xs font-black shadow-lg uppercase tracking-widest hover:bg-teal-600/40 transition"><i className="fas fa-plus mr-2"></i> TAMBAH MATERI BARU</button>}
                    <div className="relative mb-4"><i className="fas fa-search absolute top-3.5 left-3.5 text-slate-400 text-xs"></i><input type="text" placeholder="Cari judul materi..." className="w-full p-2.5 pl-9 os-input rounded-xl text-xs" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} /></div>

                    {loading ? <div className="loader mx-auto mt-4"></div> : filteredMateri.length === 0 ? <p className="text-center text-xs text-slate-500 py-6">Belum ada materi dibagikan.</p> : (
                        <div className="space-y-4">
                            {filteredMateri.map(m => {
                                const dateObj = new Date(m.tanggal || m.waktu);
                                const formattedDateTime = `${String(dateObj.getDate()).padStart(2, '0')}-${String(dateObj.getMonth() + 1).padStart(2, '0')}-${dateObj.getFullYear()}, ${String(dateObj.getHours()).padStart(2, '0')}:${String(dateObj.getMinutes()).padStart(2, '0')} WIB`;

                                // Parse JSON Data untuk kompatibilitas lama & baru
                                let lampiranArr = [];
                                try { lampiranArr = JSON.parse(m.linkData); } catch (e) { lampiranArr = [{ tipe: m.tipe, nama: 'Lampiran Utama', url: m.linkData }]; }

                                return (
                                    <div key={m.id} className="bg-white/5 border border-white/10 p-5 rounded-xl flex flex-col relative group hover:border-teal-500/40 transition">
                                        <div className="flex justify-between items-start mb-2">
                                            <div className="flex items-center gap-3">
                                                <div className="w-10 h-10 rounded-xl flex items-center justify-center text-white bg-teal-500/30 border border-teal-500/50"><i className="fas fa-book-open"></i></div>
                                                <div>
                                                    <h4 className="font-bold text-white text-base">{m.judul}</h4>
                                                    <p className="text-[9px] text-slate-400 uppercase tracking-wider">{m.pengunggah}, {formattedDateTime}</p>
                                                </div>
                                            </div>
                                            {(role === 'admin' || role === 'pelatih') && <button onClick={() => handleDelete(m.id)} className="text-red-500/70 hover:text-red-500 text-xs transition p-2 bg-red-500/10 rounded-lg"><i className="fas fa-trash"></i></button>}
                                        </div>
                                        <div className="text-sm text-slate-300 mb-4 mt-2 ml-1 border-l-2 border-white/10 pl-3 py-1 max-h-40 overflow-y-auto custom-scrollbar whitespace-pre-wrap">
                                            {m.deskripsi}
                                        </div>

                                        {/* INI KODE BARU UNTUK PREVIEW INLINE MATERI */}
                                        <div className="space-y-4 mt-4 border-t border-white/10 pt-4">
                                            <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest"><i className="fas fa-paperclip mr-1"></i> Daftar Lampiran Materi:</div>
                                            <div className="flex flex-col gap-4">
                                                {lampiranArr.map((lam, idx) => (
                                                    <div key={idx} className="bg-black/40 rounded-xl border border-white/5 p-3">
                                                        <div className="flex items-center justify-between mb-3 border-b border-white/5 pb-2">
                                                            <div className="flex items-center gap-2 overflow-hidden">
                                                                <i className={`fas ${lam.tipe === 'File' ? 'fa-file-alt text-orange-400' : 'fa-link text-blue-400'} text-sm flex-shrink-0`}></i>
                                                                <span className="text-xs text-[#FFD700] truncate font-bold uppercase">{lam.nama}</span>
                                                            </div>
                                                            {lam.tipe === 'Link' ? (
                                                                <button onClick={() => window.open(lam.url.startsWith('http') ? lam.url : 'https://' + lam.url, '_blank')} className="px-3 py-1.5 bg-blue-500/20 text-blue-400 rounded text-[9px] font-bold hover:bg-blue-500/40 transition flex items-center gap-1"><i className="fas fa-external-link-alt"></i> BUKA TAUTAN</button>
                                                            ) : (
                                                                <button onClick={() => handleDownload(lam)} className="px-3 py-1.5 bg-emerald-500/20 text-emerald-400 rounded text-[9px] font-bold hover:bg-emerald-500/40 transition flex items-center gap-1"><i className="fas fa-download"></i> UNDUH</button>
                                                            )}
                                                        </div>

                                                        {/* BOKS PRATINJAU LANGSUNG (INLINE PREVIEW) */}
                                                        {lam.tipe === 'File' && (
                                                            <div id={`materi-media-${m.id}-${idx}`} className="w-full h-64 md:h-[400px] rounded-lg overflow-hidden border border-white/10 relative bg-black/60 flex items-center justify-center group">

                                                                {/* TOMBOL FULL SCREEN */}
                                                                <div className="absolute top-3 right-3 flex gap-2 z-[70] opacity-90 hover:opacity-100 transition-opacity">
                                                                    <button onClick={(e) => {
                                                                        const container = document.getElementById(`materi-media-${m.id}-${idx}`);
                                                                        const videoElem = container.querySelector('video');
                                                                        const btn = e.currentTarget;
                                                                        const isNativeFullscreen = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement;

                                                                        if (container) {
                                                                            const isFauxFullscreen = container.classList.contains('ios-fullscreen');

                                                                            if (!isNativeFullscreen && !isFauxFullscreen) {
                                                                                if (container.requestFullscreen) {
                                                                                    container.requestFullscreen().catch(() => container.classList.add('ios-fullscreen'));
                                                                                } else if (container.webkitRequestFullscreen) {
                                                                                    container.webkitRequestFullscreen();
                                                                                } else if (videoElem && videoElem.webkitEnterFullscreen) {
                                                                                    videoElem.webkitEnterFullscreen();
                                                                                } else {
                                                                                    container.classList.add('ios-fullscreen');
                                                                                }
                                                                                btn.innerHTML = '<i class="fas fa-compress mr-1"></i> KELUAR FULL SCREEN';
                                                                            } else {
                                                                                if (isNativeFullscreen) {
                                                                                    if (document.exitFullscreen) document.exitFullscreen();
                                                                                    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                                                                                }
                                                                                if (isFauxFullscreen) {
                                                                                    container.classList.remove('ios-fullscreen');
                                                                                }
                                                                                btn.innerHTML = '<i class="fas fa-expand mr-1"></i> FULL SCREEN';
                                                                            }
                                                                        }
                                                                    }} className="px-3 py-1.5 bg-purple-600/90 text-white rounded shadow-lg text-[10px] font-bold hover:bg-purple-600 backdrop-blur-sm transition flex items-center">
                                                                        <i className="fas fa-expand mr-1"></i> FULL SCREEN
                                                                    </button>
                                                                </div>

                                                                {/* LOGIKA RENDER MEDIA */}
                                                                {lam.fileBase64 ? (
                                                                    lam.fileMime?.includes('video') ? (
                                                                        <video controls controlsList="nodownload" src={`data:${lam.fileMime};base64,${lam.fileBase64}`} className="w-full max-h-full bg-black outline-none"></video>
                                                                    ) : lam.fileMime?.includes('image') ? (
                                                                        <img src={`data:${lam.fileMime};base64,${lam.fileBase64}`} className="w-full max-h-full object-contain" />
                                                                    ) : (
                                                                        <iframe src={`data:${lam.fileMime};base64,${lam.fileBase64}`} className="w-full h-full border-0 bg-white" title="Dokumen"></iframe>
                                                                    )
                                                                ) : lam.url ? (
                                                                    <>
                                                                        <iframe src={`https://drive.google.com/file/d/${String(lam.url).match(/[-\w]{25,}/) ? String(lam.url).match(/[-\w]{25,}/)[0] : lam.url}/preview?rm=minimal`} className="w-full h-full border-0 bg-white" allow="autoplay" title="Dokumen Materi"></iframe>
                                                                        <div className="absolute top-0 left-0 w-full h-[70px] bg-transparent z-50 cursor-not-allowed" onContextMenu={(e) => e.preventDefault()}></div>
                                                                    </>
                                                                ) : (
                                                                    <div className="text-center p-6"><span className="text-white text-sm font-bold">Media Tidak Valid</span></div>
                                                                )}
                                                            </div>
                                                        )}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    )}
                </div>
            );
        }

        // --- KOMPONEN MANAJEMEN TUGAS ---
        function TugasManajemenView({ user, role, onBack }) {
            const [isEditing, setIsEditing] = React.useState(false);
            const [editId, setEditId] = React.useState(null);
            const [tugas, setTugas] = React.useState([]);
            const [paskibList, setPaskibList] = React.useState([]);
            const [view, setView] = React.useState('list');
            const [form, setForm] = React.useState({ waktu_mulai: '', waktu_selesai: '', judul: '', deskripsi: '', target_type: 'all', target_list: [], pengelola: [], kolom: [{ id: Date.now(), judul: '', deskripsi: '' }] });
            const [lampiranTugas, setLampiranTugas] = React.useState([]); // Multi lampiran tugas
            const [pelatihList, setPelatihList] = React.useState([]);

            const [selectedTugas, setSelectedTugas] = React.useState(null);
            const [selectedUserNik, setSelectedUserNik] = React.useState(null);
            const [pengumpulan, setPengumpulan] = React.useState([]);
            const [komentar, setKomentar] = React.useState('');
            const [activeKomentarId, setActiveKomentarId] = React.useState(null);
            const [loading, setLoading] = React.useState(false);
            const [searchQuery, setSearchQuery] = React.useState('');
            const [previewTugasLampiran, setPreviewTugasLampiran] = React.useState(null);
            const [genderFilter, setGenderFilter] = React.useState('Semua');

            const loadTugas = () => { setLoading(true); api.run('getTugas', role).then(res => { setTugas(res || []); setLoading(false); }); };
            React.useEffect(() => {
                loadTugas();
                api.run('getAdminDashboardData').then(d => {
                    if (d && d.paskibraka) setPaskibList(d.paskibraka.list.filter(x => x.status === 'Active'));
                    if (d && d.pelatih) setPelatihList(d.pelatih.list.filter(x => x.status === 'Active'));
                });
            }, []);
            React.useEffect(() => { setSearchQuery(''); }, [view, selectedUserNik]);

            const handleToggleTarget = (nik) => { const isSelected = form.target_list.includes(nik); setForm({ ...form, target_list: isSelected ? form.target_list.filter(n => n !== nik) : [...form.target_list, nik] }); };
            const handleAddKolom = () => setForm({ ...form, kolom: [...form.kolom, { id: Date.now(), judul: '', deskripsi: '' }] });
            const handleUpdateKolom = (id, field, val) => setForm({ ...form, kolom: form.kolom.map(k => k.id === id ? { ...k, [field]: val } : k) });
            const handleRemoveKolom = (id) => setForm({ ...form, kolom: form.kolom.filter(k => k.id !== id) });

            // LOGIKA LAMPIRAN TUGAS
            const handleAddFileTugas = (e) => { const file = e.target.files[0]; if (file) setLampiranTugas([...lampiranTugas, { id: Date.now(), tipe: 'File', file: file, nama: file.name }]); e.target.value = null; };
            const handleAddLinkTugas = () => { const url = prompt("Masukkan Tautan:"); if (url) setLampiranTugas([...lampiranTugas, { id: Date.now(), tipe: 'Link', url: url, nama: prompt("Judul Tautan:", "Tautan") || 'Tautan' }]); };
            const handleRemoveLampiranTugas = (id) => setLampiranTugas(lampiranTugas.filter(l => l.id !== id));

            const processLampiranTugas = async () => {
                let processed = [];
                const fileItems = lampiranTugas.filter(l => l.tipe === 'File' && l.file);
                const totalFiles = fileItems.length;
                let currentFileIndex = 0;

                for (let item of lampiranTugas) {
                    if (item.tipe === 'File' && item.file) {
                        currentFileIndex++;

                        // 1. Buat Sesi Resumable Upload ke Server Google Drive
                        const uploadUrl = await api.run('getUploadUrl', {
                            filename: "TGS_" + Date.now() + "_" + item.nama,
                            mimeType: item.file.type,
                            origin: window.location.origin
                        });

                        // 2. Kirim raw file langsung tanpa dikonversi teks (Anti Crash / Memory Leak)
                        const fileId = await new Promise((resolve, reject) => {
                            const xhr = new XMLHttpRequest();
                            xhr.open('PUT', uploadUrl, true);

                            xhr.onload = () => {
                                if (xhr.status === 200 || xhr.status === 201) {
                                    resolve(JSON.parse(xhr.responseText).id);
                                } else {
                                    reject("Gagal upload lampiran tugas: " + item.nama);
                                }
                            };
                            xhr.onerror = () => reject("Masalah jaringan saat mengunggah lampiran: " + item.nama);
                            xhr.send(item.file);
                        });

                        processed.push({
                            tipe: 'File',
                            nama: item.nama,
                            url: fileId,
                            fileMime: item.file.type
                        });
                    } else if (item.tipe === 'Link') {
                        processed.push({ tipe: 'Link', nama: item.nama, url: item.url });
                    } else {
                        processed.push(item); // Mempertahankan lampiran file lama jika sedang mode Edit Tugas
                    }
                }
                return processed;
            };

            const handleBuatTugas = async () => {
                if (!form.judul || !form.deskripsi || !form.waktu_mulai || !form.waktu_selesai) return alert("Lengkapi data jadwal, judul, dan deskripsi utama!");
                if (form.target_type === 'specific' && form.target_list.length === 0) return alert("Pilih minimal 1 target Paskibraka!");
                if (form.kolom.length === 0 || form.kolom.some(k => !k.judul)) return alert("Pastikan seluruh judul kolom pengumpulan terisi!");

                setLoading(true);
                const finalPayload = { ...form, pembuat: user.nama, lampiran: await processLampiranTugas() };

                try {
                    if (isEditing) {
                        const res = await api.run('editTugas', { ...finalPayload, id: editId });
                        alert(res.message); setIsEditing(false); setEditId(null);
                    } else {
                        const res = await api.run('addTugas', finalPayload);
                        alert(res.message);
                    }
                    loadTugas(); setView('list'); setLoading(false);
                } catch (err) { alert(err); setLoading(false); }
            };

            const bukaTugas = (t) => { setSelectedTugas(t); setSelectedUserNik(null); setView('detail'); setLoading(true); api.run('getPengumpulan', t.id).then(res => { setPengumpulan(res || []); setLoading(false); }); };
            // TIMPA FUNGSI LAMA DENGAN INI
            const kirimKomentar = (id_pengumpulan) => {
                if (!komentar) return;

                const teksKomentar = komentar;
                // Cek role untuk label komentar
                const currentRole = role === 'admin' ? 'Admin' : (role === 'pelatih' ? 'Pelatih' : 'Paskibraka');

                // 1. Bersihkan input dan matikan state aktif secara INSTAN
                setKomentar('');
                setActiveKomentarId(null);

                // 2. Update state Pengumpulan secara INSTAN agar tampil di layar
                const komentarBaru = {
                    username: user.nama,
                    role: currentRole,
                    teks: teksKomentar,
                    waktu: new Date().toISOString()
                };

                setPengumpulan(prev => prev.map(item => {
                    if (item.id_pengumpulan === id_pengumpulan) {
                        return { ...item, komentar: [...(item.komentar || []), komentarBaru] };
                    }
                    return item;
                }));

                // 3. Kirim ke Database di background tanpa memblokir UI
                api.run('addKomentarTugas', {
                    id_pengumpulan: id_pengumpulan,
                    username: user.nama,
                    role: currentRole,
                    teks: teksKomentar
                }).catch(err => console.error("Komentar gagal tersimpan: ", err));
            };
            const handleDownload = async (lampiran) => {
                if (lampiran.fileBase64) {
                    const link = document.createElement('a');
                    link.href = `data:${lampiran.fileMime};base64,${lampiran.fileBase64}`;
                    link.download = lampiran.nama || 'Lampiran';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                } else if (lampiran.url) {
                    const fileIdMatch = lampiran.url.match(/[-\w]{25,}/);
                    const fileId = fileIdMatch ? fileIdMatch[0] : lampiran.url;
                    try {
                        document.body.style.cursor = 'wait';
                        const res = await api.run('downloadSecureFile', fileId);
                        const link = document.createElement('a');
                        link.href = `data:${res.mimeType};base64,${res.base64}`;
                        link.download = res.name || lampiran.nama || 'Dokumen_Unduhan';
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                    } catch (err) {
                        alert("Gagal memproses unduhan: " + err);
                    } finally {
                        document.body.style.cursor = 'default';
                    }
                }
            };
            if (previewTugasLampiran) {
                return (
                    <div className="os-window p-6 rounded-[2rem] h-[85vh] animate-in flex flex-col overflow-hidden">
                        <div className="flex justify-between items-center mb-4 flex-none">
                            <button onClick={() => setPreviewTugasLampiran(null)} className="w-8 h-8 rounded-full bg-white/5 hover:bg-white/20 transition"><i className="fas fa-arrow-left"></i></button>
                            <h3 className="font-black text-sm text-purple-400 tracking-widest truncate ml-3 uppercase">{previewTugasLampiran.nama}</h3>
                        </div>
                        <div className="flex-1 w-full bg-black/40 rounded-xl overflow-hidden relative border border-white/10 mb-4 flex items-center justify-center">
                            {previewTugasLampiran.url ? (<>
                                <iframe
                                    src={`https://drive.google.com/file/d/${previewTugasLampiran.url}/preview?rm=minimal`}
                                    className="w-full h-full border-0 bg-white"
                                    allow="autoplay" title="Dokumen Lampiran Tugas">
                                </iframe>
                                {/* INVISIBLE SHIELD SUPER */}
                                <div
                                    className="absolute top-0 left-0 w-full h-[70px] bg-transparent z-50 cursor-not-allowed"
                                    title="Akses Lanjutan Dikunci"
                                    onContextMenu={(e) => e.preventDefault()}>
                                </div>
                            </>
                            ) : previewTugasLampiran.fileBase64 ? (
                                previewTugasLampiran.fileMime.includes('video') ? (
                                    <video controls src={`data:${previewTugasLampiran.fileMime};base64,${previewTugasLampiran.fileBase64}`} className="w-full rounded-lg max-h-full bg-black"></video>
                                ) : previewTugasLampiran.fileMime.includes('image') ? (
                                    <img src={`data:${previewTugasLampiran.fileMime};base64,${previewTugasLampiran.fileBase64}`} className="w-full rounded-lg max-h-full object-contain" />
                                ) : (
                                    <iframe src={`data:${previewTugasLampiran.fileMime};base64,${previewTugasLampiran.fileBase64}`} className="w-full h-full border-0 bg-white" title="Dokumen Lokal"></iframe>
                                )
                            ) : (
                                <div className="text-center p-6"><span className="text-white text-sm font-bold">Media Tidak Valid</span></div>
                            )}
                        </div>
                        <button onClick={() => handleDownload(previewTugasLampiran)} className="w-full bg-gradient-to-r from-purple-600 to-indigo-600 py-4 rounded-xl font-black text-white text-sm tracking-widest shadow-lg text-center flex items-center justify-center gap-2 transition hover:scale-[1.02] flex-none">
                            <i className="fas fa-cloud-download-alt"></i> UNDUH LAMPIRAN INI
                        </button>
                    </div>
                );
            }
            if (view === 'create') return (
                <div className="os-window p-6 rounded-[2rem] h-[85vh] animate-in flex flex-col space-y-4 overflow-y-auto custom-scrollbar">
                    <div className="flex justify-between items-center bg-black/50 p-4 -mx-6 -mt-6 rounded-t-[2rem] mb-2"><button onClick={() => setView('list')} className="w-8 h-8 rounded-full bg-white/5 hover:bg-white/20"><i className="fas fa-arrow-left"></i></button><h3 className="font-bold tracking-widest text-[#FFD700]">{isEditing ? 'EDIT TUGAS' : 'TUGAS BARU'}</h3></div>
                    <div className="grid grid-cols-2 gap-4">
                        <div><label className="text-[10px] font-bold text-slate-400">DIBERIKAN (MULAI)</label><input type="datetime-local" className="w-full p-3 os-input rounded-xl text-xs" value={form.waktu_mulai} onChange={e => setForm({ ...form, waktu_mulai: e.target.value })} /></div>
                        <div><label className="text-[10px] font-bold text-slate-400">BATAS AKHIR (DL)</label><input type="datetime-local" className="w-full p-3 os-input rounded-xl text-xs" value={form.waktu_selesai} onChange={e => setForm({ ...form, waktu_selesai: e.target.value })} /></div>
                    </div>
                    <input placeholder="Judul Penugasan Utama" className="p-3 os-input rounded-xl font-bold" value={form.judul} onChange={e => setForm({ ...form, judul: e.target.value })} />
                    <textarea placeholder="Deskripsi Tugas Utama" rows="3" className="p-3 os-input rounded-xl text-sm" value={form.deskripsi} onChange={e => setForm({ ...form, deskripsi: e.target.value })}></textarea>

                    {/* LAMPIRAN TUGAS */}
                    <div className="bg-black/30 p-4 rounded-xl border border-white/10">
                        <label className="text-xs font-bold text-purple-400 mb-3 block"><i className="fas fa-paperclip mr-1"></i> LAMPIRAN PENDUKUNG (OPSIONAL)</label>
                        <div className="space-y-2 mb-4">
                            {lampiranTugas.map((l, i) => (
                                <div key={l.id || i} className="flex justify-between items-center bg-white/5 p-2 rounded-lg border border-white/10">
                                    <div className="flex items-center gap-2 text-xs text-white truncate"><i className={`fas ${l.tipe === 'File' ? 'fa-file-alt text-orange-400' : 'fa-link text-blue-400'}`}></i> <span className="truncate">{l.nama}</span></div>
                                    <button onClick={() => handleRemoveLampiranTugas(l.id)} className="text-red-400 hover:text-red-500 p-1"><i className="fas fa-times"></i></button>
                                </div>
                            ))}
                            {lampiranTugas.length === 0 && <div className="text-[10px] text-slate-500 italic text-center py-2">Belum ada lampiran ditambahkan.</div>}
                        </div>
                        <div className="flex gap-2">
                            <label className="flex-1 bg-white/10 hover:bg-white/20 text-white text-[10px] font-bold py-2 rounded-lg text-center cursor-pointer transition border border-white/20"><i className="fas fa-upload mr-1"></i> FILE <input type="file" className="hidden" onChange={handleAddFileTugas} disabled={loading} /></label>
                            <button onClick={handleAddLinkTugas} disabled={loading} className="flex-1 bg-white/10 hover:bg-white/20 text-white text-[10px] font-bold py-2 rounded-lg text-center transition border border-white/20"><i className="fas fa-link mr-1"></i> TAUTAN</button>
                        </div>
                    </div>

                    <div className="bg-black/30 p-4 rounded-xl border border-white/10">
                        <label className="text-xs font-bold text-[#FFD700] mb-2 block">TARGET PASKIBRAKA</label>
                        <select className="w-full p-3 os-select rounded-xl text-sm mb-3" value={form.target_type} onChange={e => setForm({ ...form, target_type: e.target.value })}>
                            <option value="all">SEMUA PASKIBRAKA</option>
                            <option value="specific">PILIH SPESIFIK (CEKLIST)</option>
                        </select>
                        {form.target_type === 'specific' && (
                            <>
                                <div className="flex gap-2 mb-3">
                                    {['Semua', 'Putra', 'Putri'].map(g => (
                                        <button key={g} onClick={(e) => { e.preventDefault(); setGenderFilter(g); }} className={`flex-1 py-1.5 text-[10px] font-bold rounded-lg border transition ${genderFilter === g ? 'bg-blue-600 border-blue-600 text-white shadow-lg' : 'bg-white/5 border-white/10 text-slate-400'}`}>
                                            {g.toUpperCase()}
                                        </button>
                                    ))}
                                </div>
                                <div className="max-h-40 overflow-y-auto custom-scrollbar bg-black/50 p-3 rounded-lg border border-white/5 space-y-2">
                                    {paskibList.filter(p => genderFilter === 'Semua' || p.jenisKelamin === genderFilter).map(p => (
                                        <label key={p.nik} className="flex items-center gap-3 cursor-pointer hover:bg-white/5 p-2 rounded">
                                            <input type="checkbox" checked={form.target_list.includes(p.nik)} onChange={() => handleToggleTarget(p.nik)} className="w-4 h-4 accent-[#FFD700]" />
                                            <div className="text-xs font-bold text-white">{`${p.lapangan} (${p.nama})`.toUpperCase()}</div>
                                        </label>
                                    ))}
                                </div>
                            </>
                        )}
                    </div>

                    {role === 'admin' && (
                        <div className="bg-black/30 p-4 rounded-xl border border-white/10 mt-3">
                            <label className="text-xs font-bold text-blue-400 mb-2 block">PENGELOLA TUGAS (PELATIH)</label>
                            <p className="text-[10px] text-slate-400 mb-3">Pilih pelatih yang diizinkan untuk mengelola (mengedit/menghapus) tugas ini.</p>
                            <div className="max-h-40 overflow-y-auto custom-scrollbar bg-black/50 p-3 rounded-lg border border-white/5 space-y-2">
                                {pelatihList.map(p => (
                                    <label key={p.username} className="flex items-center gap-3 cursor-pointer hover:bg-white/5 p-2 rounded">
                                        <input type="checkbox" checked={form.pengelola.includes(p.username)} onChange={() => {
                                            const isSelected = form.pengelola.includes(p.username);
                                            setForm({ ...form, pengelola: isSelected ? form.pengelola.filter(n => n !== p.username) : [...form.pengelola, p.username] });
                                        }} className="w-4 h-4 accent-blue-500" />
                                        <div className="text-xs font-bold text-white">{p.nama.toUpperCase()} <span className="text-[10px] text-slate-400">({p.jabatan})</span></div>
                                    </label>
                                ))}
                            </div>
                        </div>
                    )}
                    <div className="bg-blue-900/10 p-4 rounded-xl border border-blue-500/20">
                        <div className="flex justify-between items-center mb-3"><label className="text-xs font-bold text-blue-400">KOLOM PENGUMPULAN DATA</label><button onClick={handleAddKolom} className="px-3 py-1 bg-blue-600/30 text-blue-400 rounded text-[10px] font-bold hover:bg-blue-600/50"><i className="fas fa-plus"></i> TAMBAH KOLOM</button></div>
                        {form.kolom.map((k, i) => (
                            <div key={k.id} className="bg-black/50 p-3 rounded-xl border border-white/5 mb-3 relative">
                                <div className="absolute top-2 right-2 flex gap-2"><div className="text-[10px] text-slate-500 font-bold">KOLOM #{i + 1}</div>{form.kolom.length > 1 && <button onClick={() => handleRemoveKolom(k.id)} className="text-red-500 hover:text-red-400 text-xs"><i className="fas fa-times"></i></button>}</div>
                                <input placeholder="Judul Kolom (cth: Video PBB, Foto Atribut)" className="w-full p-2 os-input rounded-lg text-xs font-bold mb-2 pr-16" value={k.judul} onChange={e => handleUpdateKolom(k.id, 'judul', e.target.value)} />
                                <textarea placeholder="Deskripsi/Instruksi Kolom ini..." rows="2" className="w-full p-2 os-input rounded-lg text-[10px]" value={k.deskripsi} onChange={e => handleUpdateKolom(k.id, 'deskripsi', e.target.value)}></textarea>
                            </div>
                        ))}
                    </div>
                    <button disabled={loading} onClick={handleBuatTugas} className="btn-green p-4 rounded-xl font-black text-sm tracking-widest mt-2 shadow-[0_0_15px_rgba(16,185,129,0.3)]">{loading ? "MENYIMPAN..." : (isEditing ? "UPDATE TUGAS" : "SIMPAN & PUBLIKASIKAN TUGAS")}</button>
                    {isEditing && <button onClick={() => { setIsEditing(false); setView('list'); }} className="mt-2 w-full py-3 bg-red-500/20 text-red-400 rounded-lg text-[10px] font-bold border border-red-500/30 hover:bg-red-500/40 transition">BATAL EDIT</button>}
                </div>
            );

            if (view === 'detail') {
                if (!selectedUserNik) {
                    const targetPaskibraka = selectedTugas.target_type === 'all'
                        ? paskibList
                        : paskibList.filter(p => selectedTugas.target_list.some(n => cleanStr(n) === cleanStr(p.nik)));
                    const filteredPaskibraka = targetPaskibraka.filter(p => {
                        const matchSearch = p.nama.toLowerCase().includes(searchQuery.toLowerCase()) || p.nik.toLowerCase().includes(searchQuery.toLowerCase()) || (p.lapangan && p.lapangan.toLowerCase().includes(searchQuery.toLowerCase()));
                        const matchGender = genderFilter === 'Semua' || p.jenisKelamin === genderFilter;
                        return matchSearch && matchGender;
                    });

                    return (
                        <div className="os-window p-6 rounded-[2rem] h-[85vh] animate-in flex flex-col space-y-4 overflow-y-auto custom-scrollbar">
                            <div className="flex justify-between items-center border-b border-white/10 pb-2"><button onClick={() => setView('list')} className="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center"><i className="fas fa-arrow-left"></i></button><h3 className="font-bold text-[#FFD700] uppercase text-xs tracking-wider">TARGET PENUGASAN</h3></div>
                            <div className="bg-white/5 p-4 rounded-xl border border-white/10">
                                <h4 className="font-bold text-white text-sm">{selectedTugas.judul}</h4>
                                <div className="text-[11px] text-slate-300 mt-2 mb-2 p-3 bg-black/40 rounded-lg border border-white/5 max-h-48 overflow-y-auto custom-scrollbar whitespace-pre-wrap">
                                    {selectedTugas.deskripsi}
                                </div>
                                <p className="text-[10px] text-slate-400 mt-1"><i className="fas fa-clock text-red-400"></i> Deadline: {new Date(selectedTugas.waktu_selesai).toLocaleString('id-ID')}</p>

                                {/* TAMPILAN LAMPIRAN DI DETAIL TUGAS */}
                                {selectedTugas.lampiran && selectedTugas.lampiran.length > 0 && (
                                    <div className="mt-3 pt-3 border-t border-white/10">
                                        <div className="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-2"><i className="fas fa-paperclip"></i> Lampiran Tugas:</div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
                                            {selectedTugas.lampiran.map((lam, idx) => (
                                                <div key={idx} className="flex items-center justify-between p-2.5 bg-black/40 rounded-lg border border-white/5 transition text-left">
                                                    <div className="flex items-center gap-2 overflow-hidden">
                                                        <i className={`fas ${lam.tipe === 'File' ? 'fa-file-alt text-orange-400' : 'fa-link text-blue-400'} text-xs flex-shrink-0`}></i>
                                                        <span className="text-xs text-white truncate font-medium">{lam.nama}</span>
                                                    </div>
                                                    <div className="flex gap-1.5 flex-shrink-0">
                                                        <button onClick={() => { if (lam.tipe === 'File') setPreviewTugasLampiran(lam); else window.open(lam.url.startsWith('http') ? lam.url : 'https://' + lam.url, '_blank'); }} className="px-3 py-1 bg-blue-500/20 text-blue-400 rounded text-[9px] font-bold hover:bg-blue-500/40 transition">PREVIEW</button>
                                                        {lam.tipe === 'File' && <button onClick={() => handleDownload(lam)} className="px-3 py-1 bg-emerald-500/20 text-emerald-400 rounded text-[9px] font-bold hover:bg-emerald-500/40 transition">UNDUH</button>}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                            <div className="relative mb-3"><i className="fas fa-search absolute top-3.5 left-3.5 text-slate-400 text-xs"></i><input type="text" placeholder="Cari nama Paskibraka atau NIK..." className="w-full p-2.5 pl-9 os-input rounded-xl text-xs" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} /></div>

                            <div className="flex gap-2 mb-3">
                                {['Semua', 'Putra', 'Putri'].map(g => (
                                    <button key={g} onClick={() => setGenderFilter(g)} className={`flex-1 py-1.5 text-[10px] font-bold rounded-lg border transition ${genderFilter === g ? 'bg-blue-600 border-blue-600 text-white shadow-lg' : 'bg-white/5 border-white/10 text-slate-400'}`}>
                                        {g.toUpperCase()}
                                    </button>

        const FileViewerModal = ({ url, mimeType, onClose }) => {
            // Fungsi untuk mengubah link Drive biasa menjadi link Preview
            const getEmbedUrl = (fileUrl) => {
                if (!fileUrl) return '';
                if (fileUrl.includes('/preview')) return fileUrl;

                // Mendeteksi format link: drive.google.com/file/d/ID/...
                const driveRegex = /\/file\/d\/([a-zA-Z0-9_-]+)/;
                const match = fileUrl.match(driveRegex);
                if (match && match[1]) {
                    return `https://drive.google.com/file/d/${match[1]}/preview`;
                }

                // Mendeteksi format link: drive.google.com/open?id=ID atau uc?id=ID
                const idRegex = /id=([a-zA-Z0-9_-]+)/;
                const matchId = fileUrl.match(idRegex);
                if (matchId && matchId[1]) {
                    return `https://drive.google.com/file/d/${matchId[1]}/preview`;
                }

                return fileUrl; // Return original jika bukan link drive
            };

            const embedUrl = getEmbedUrl(url);

            return (
                <div className="fixed inset-0 z-[9999] flex items-center justify-center bg-black/90 backdrop-blur-sm p-2 sm:p-4 animate-in">
                    <div className="bg-[#111] w-full max-w-5xl h-[90vh] rounded-2xl flex flex-col border border-white/20 shadow-2xl overflow-hidden relative">

                            </button>

                        {/* Area Tampilan File */}
                        <div className="flex-1 bg-white relative w-full h-full">
                            {/* Loading spinner di belakang iframe */}
                            <div className="absolute inset-0 flex items-center justify-center bg-gray-100 z-0">
                                <div className="loader w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                                <span className="ml-3 text-gray-500 text-sm font-bold">Memuat Dokumen...</span>
                            </div>

                            {/* Iframe Penampil (Mendukung PDF, Word, Excel, HEIC via Google Drive) */}
